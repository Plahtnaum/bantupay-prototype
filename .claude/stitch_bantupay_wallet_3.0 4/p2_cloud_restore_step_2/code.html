<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BantuPay - Restore Backup</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-surface": "#191c1f",
                    "on-secondary-fixed-variant": "#77320b",
                    "error": "#ba1a1a",
                    "secondary-fixed": "#ffdbcc",
                    "primary": "#a23f00",
                    "secondary-container": "#fd9a6c",
                    "on-secondary": "#ffffff",
                    "inverse-on-surface": "#eff1f5",
                    "tertiary-fixed": "#d0e4ff",
                    "primary-fixed": "#ffdbcc",
                    "inverse-surface": "#2e3134",
                    "surface-tint": "#a23f00",
                    "on-error-container": "#93000a",
                    "surface-container-high": "#e7e8ec",
                    "on-secondary-container": "#753009",
                    "on-primary": "#ffffff",
                    "outline": "#8e7165",
                    "on-tertiary-fixed": "#001d35",
                    "on-secondary-fixed": "#351000",
                    "error-container": "#ffdad6",
                    "surface-container": "#edeef2",
                    "secondary-fixed-dim": "#ffb695",
                    "surface-variant": "#e1e2e6",
                    "on-tertiary": "#ffffff",
                    "on-primary-fixed-variant": "#7b2f00",
                    "surface-dim": "#d9dade",
                    "surface-bright": "#f8f9fd",
                    "secondary": "#964921",
                    "on-error": "#ffffff",
                    "inverse-primary": "#ffb695",
                    "surface-container-low": "#f2f3f7",
                    "tertiary": "#0062a1",
                    "on-background": "#191c1f",
                    "on-primary-container": "#551e00",
                    "on-tertiary-fixed-variant": "#00497b",
                    "primary-fixed-dim": "#ffb695",
                    "outline-variant": "#e2bfb1",
                    "tertiary-container": "#009cfc",
                    "surface-container-lowest": "#ffffff",
                    "surface": "#f8f9fd",
                    "on-primary-fixed": "#351000",
                    "background": "#f8f9fd",
                    "tertiary-fixed-dim": "#9ccaff",
                    "primary-container": "#fc690a",
                    "surface-container-highest": "#e1e2e6",
                    "on-tertiary-container": "#003155",
                    "on-surface-variant": "#5a4137"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Inter"],
                    "label": ["Inter"],
                    "mono": ["JetBrains Mono"]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-mesh {
            background: radial-gradient(at 0% 0%, rgba(252, 105, 10, 0.05) 0px, transparent 50%),
                        radial-gradient(at 100% 100%, rgba(252, 105, 10, 0.03) 0px, transparent 50%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col items-center selection:bg-primary-container selection:text-on-primary-container">
<!-- Top Navigation Bar (Fixed) -->
<nav class="fixed top-0 w-full z-50 bg-[#F5F6FA]/80 backdrop-blur-xl flex justify-between items-center px-6 py-4">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-primary active:scale-95 transition-transform">
<span class="material-symbols-outlined">arrow_back</span>
</div>
</div>
<div class="font-headline font-bold tracking-tight text-xl text-[#FC690A]">BantuPay</div>
<div class="w-10 h-10 flex items-center justify-center text-gray-500">
<span class="material-symbols-outlined" data-icon="help">help</span>
</div>
</nav>
<main class="w-full max-w-md px-6 pt-24 pb-12 flex flex-col items-center bg-mesh">
<!-- Success Header -->
<div class="flex flex-col items-center text-center mb-8">
<div class="w-20 h-20 bg-emerald-50 rounded-full flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-emerald-500 !text-5xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<h1 class="font-headline text-3xl font-extrabold tracking-tight text-on-surface mb-2">Backup found</h1>
<p class="text-on-surface-variant font-medium">We've identified an encrypted backup on your cloud storage.</p>
</div>
<!-- Metadata Card (Editorial Layout) -->
<div class="w-full bg-surface-container-lowest rounded-lg p-6 mb-8 shadow-card border border-outline-variant/10">
<div class="space-y-5">
<div class="flex flex-col">
<span class="text-xs font-bold uppercase tracking-widest text-on-surface-variant/60 mb-1">Last backed up</span>
<span class="font-headline text-lg font-bold">3 days ago</span>
</div>
<div class="flex items-center gap-4 py-4 border-y border-outline-variant/10">
<div class="w-12 h-12 bg-surface-container-high rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant">smartphone</span>
</div>
<div class="flex flex-col">
<span class="text-[10px] font-bold uppercase tracking-wider text-on-surface-variant/60">Device</span>
<span class="font-headline font-semibold">iPhone 14 Pro</span>
</div>
</div>
<div class="flex flex-col">
<span class="text-xs font-bold uppercase tracking-widest text-on-surface-variant/60 mb-1">Wallet Address</span>
<span class="font-mono text-sm bg-surface-container-low px-3 py-2 rounded-md text-on-surface tracking-tight">..... ...3f9a</span>
</div>
</div>
</div>
<!-- PIN Entry Section -->
<div class="w-full text-center">
<h2 class="font-headline text-lg font-bold text-on-surface mb-6">Enter your PIN to restore</h2>
<!-- 6-dot PIN Display -->
<div class="flex justify-center gap-4 mb-10">
<div class="w-4 h-4 rounded-full bg-primary ring-4 ring-primary/20"></div>
<div class="w-4 h-4 rounded-full bg-primary ring-4 ring-primary/20"></div>
<div class="w-4 h-4 rounded-full bg-surface-container-highest"></div>
<div class="w-4 h-4 rounded-full bg-surface-container-highest"></div>
<div class="w-4 h-4 rounded-full bg-surface-container-highest"></div>
<div class="w-4 h-4 rounded-full bg-surface-container-highest"></div>
</div>
<!-- Numpad (Dark Theme Context) -->
<div class="bg-inverse-surface rounded-xl p-8 grid grid-cols-3 gap-6 shadow-2xl">
<!-- Row 1 -->
<button class="w-full aspect-square flex items-center justify-center text-inverse-on-surface text-2xl font-headline font-bold hover:bg-white/10 rounded-full transition-colors active:scale-90">1</button>
<button class="w-full aspect-square flex items-center justify-center text-inverse-on-surface text-2xl font-headline font-bold hover:bg-white/10 rounded-full transition-colors active:scale-90">2</button>
<button class="w-full aspect-square flex items-center justify-center text-inverse-on-surface text-2xl font-headline font-bold hover:bg-white/10 rounded-full transition-colors active:scale-90">3</button>
<!-- Row 2 -->
<button class="w-full aspect-square flex items-center justify-center text-inverse-on-surface text-2xl font-headline font-bold hover:bg-white/10 rounded-full transition-colors active:scale-90">4</button>
<button class="w-full aspect-square flex items-center justify-center text-inverse-on-surface text-2xl font-headline font-bold hover:bg-white/10 rounded-full transition-colors active:scale-90">5</button>
<button class="w-full aspect-square flex items-center justify-center text-inverse-on-surface text-2xl font-headline font-bold hover:bg-white/10 rounded-full transition-colors active:scale-90">6</button>
<!-- Row 3 -->
<button class="w-full aspect-square flex items-center justify-center text-inverse-on-surface text-2xl font-headline font-bold hover:bg-white/10 rounded-full transition-colors active:scale-90">7</button>
<button class="w-full aspect-square flex items-center justify-center text-inverse-on-surface text-2xl font-headline font-bold hover:bg-white/10 rounded-full transition-colors active:scale-90">8</button>
<button class="w-full aspect-square flex items-center justify-center text-inverse-on-surface text-2xl font-headline font-bold hover:bg-white/10 rounded-full transition-colors active:scale-90">9</button>
<!-- Row 4 -->
<button class="w-full aspect-square flex items-center justify-center text-inverse-on-surface text-2xl font-headline font-bold hover:bg-white/10 rounded-full transition-colors active:scale-90">
<span class="material-symbols-outlined">fingerprint</span>
</button>
<button class="w-full aspect-square flex items-center justify-center text-inverse-on-surface text-2xl font-headline font-bold hover:bg-white/10 rounded-full transition-colors active:scale-90">0</button>
<button class="w-full aspect-square flex items-center justify-center text-inverse-on-surface text-2xl font-headline font-bold hover:bg-white/10 rounded-full transition-colors active:scale-90">
<span class="material-symbols-outlined">backspace</span>
</button>
</div>
</div>
<!-- Footer Link -->
<div class="mt-12">
<a class="text-primary font-semibold text-sm hover:underline transition-all" href="#">Not your backup?</a>
</div>
</main>
<!-- Bottom Navigation Bar (SUPPRESSED for Task Focus) -->
<!-- Navigation shell is hidden as per UX Goal: prioritized focus on recovery journey -->
</body></html>
