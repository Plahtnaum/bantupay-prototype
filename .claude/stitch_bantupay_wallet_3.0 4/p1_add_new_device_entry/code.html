<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface": "#191c1f",
                        "on-secondary-fixed-variant": "#77320b",
                        "error": "#ba1a1a",
                        "secondary-fixed": "#ffdbcc",
                        "primary": "#a23f00",
                        "secondary-container": "#fd9a6c",
                        "on-secondary": "#ffffff",
                        "inverse-on-surface": "#eff1f5",
                        "tertiary-fixed": "#d0e4ff",
                        "primary-fixed": "#ffdbcc",
                        "inverse-surface": "#2e3134",
                        "surface-tint": "#a23f00",
                        "on-error-container": "#93000a",
                        "surface-container-high": "#e7e8ec",
                        "on-secondary-container": "#753009",
                        "on-primary": "#ffffff",
                        "outline": "#8e7165",
                        "on-tertiary-fixed": "#001d35",
                        "on-secondary-fixed": "#351000",
                        "error-container": "#ffdad6",
                        "surface-container": "#edeef2",
                        "secondary-fixed-dim": "#ffb695",
                        "surface-variant": "#e1e2e6",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed-variant": "#7b2f00",
                        "surface-dim": "#d9dade",
                        "surface-bright": "#f8f9fd",
                        "secondary": "#964921",
                        "on-error": "#ffffff",
                        "inverse-primary": "#ffb695",
                        "surface-container-low": "#f2f3f7",
                        "tertiary": "#0062a1",
                        "on-background": "#191c1f",
                        "on-primary-container": "#551e00",
                        "on-tertiary-fixed-variant": "#00497b",
                        "primary-fixed-dim": "#ffb695",
                        "outline-variant": "#e2bfb1",
                        "tertiary-container": "#009cfc",
                        "surface-container-lowest": "#ffffff",
                        "surface": "#f8f9fd",
                        "on-primary-fixed": "#351000",
                        "background": "#f8f9fd",
                        "tertiary-fixed-dim": "#9ccaff",
                        "primary-container": "#fc690a",
                        "surface-container-highest": "#e1e2e6",
                        "on-tertiary-container": "#003155",
                        "on-surface-variant": "#5a4137"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        body {
            background-color: #0F0F12;
            color: #f8f9fd;
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(25, 28, 31, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(226, 191, 177, 0.1);
        }
        .kinetic-glow {
            box-shadow: 0 0 40px -10px rgba(252, 105, 10, 0.2);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col items-center justify-start overflow-x-hidden">
<!-- Header (Suppressed Nav Shell as per Task-Focused/Linear Journey Rule) -->
<header class="w-full max-w-md px-6 py-8 flex items-center justify-between z-50">
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-white/5 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-white">chevron_left</span>
</button>
</header>
<main class="w-full max-w-md px-8 pb-12 flex flex-col">
<!-- Illustration Section: Asymmetric & Kinetic -->
<div class="relative w-full h-64 mb-10 flex items-center justify-center">
<!-- Background Glows -->
<div class="absolute w-40 h-40 bg-[#FC690A] opacity-20 blur-[80px] rounded-full -top-10 -right-10"></div>
<div class="absolute w-32 h-32 bg-tertiary-container opacity-10 blur-[60px] rounded-full bottom-0 -left-10"></div>
<div class="relative flex items-center space-x-[-20px]">
<!-- Phone A -->
<div class="w-24 h-48 rounded-[2rem] border-4 border-white/10 bg-[#1A1A1E] flex flex-col p-3 shadow-2xl rotate-[-12deg] relative z-10">
<div class="w-8 h-1 bg-white/20 rounded-full mx-auto mb-4"></div>
<div class="flex-1 rounded-xl bg-white/5 flex flex-col gap-2 p-2">
<div class="h-2 w-3/4 bg-white/10 rounded"></div>
<div class="h-2 w-1/2 bg-white/10 rounded"></div>
</div>
</div>
<!-- Connecting Bridge Graphic -->
<div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-32 h-24 overflow-visible pointer-events-none z-20">
<svg class="w-full h-full" fill="none" viewbox="0 0 100 60" xmlns="http://www.w3.org/2000/svg">
<path d="M10 30 Q 50 10 90 30" stroke="#FC690A" stroke-dasharray="4 4" stroke-width="2"></path>
<path d="M10 35 Q 50 55 90 35" stroke="#FC690A" stroke-opacity="0.4" stroke-width="2"></path>
<circle class="animate-pulse" cx="50" cy="30" fill="#FC690A" r="4"></circle>
</svg>
</div>
<!-- Phone B -->
<div class="w-24 h-48 rounded-[2rem] border-4 border-[#FC690A]/30 bg-[#1A1A1E] flex flex-col p-3 shadow-2xl rotate-[8deg] relative z-30 kinetic-glow">
<div class="w-8 h-1 bg-white/20 rounded-full mx-auto mb-4"></div>
<div class="flex-1 rounded-xl bg-[#FC690A]/10 flex items-center justify-center">
<span class="material-symbols-outlined text-[#FC690A] text-3xl" style="font-variation-settings: 'FILL' 1;">sync</span>
</div>
</div>
</div>
</div>
<!-- Typography: Editorial Scale -->
<div class="space-y-3 mb-10 text-left">
<h1 class="font-headline text-4xl font-extrabold tracking-tight text-white leading-tight">
                Set up this device
            </h1>
<p class="font-body text-gray-400 text-lg leading-relaxed max-w-[90%]">
                Your wallet lives on the blockchain. Add it to this device in seconds.
            </p>
</div>
<!-- Option Cards: Bento Style Layering -->
<div class="grid grid-cols-1 gap-4 w-full">
<!-- Card 1: Cloud Restore (Primary) -->
<button class="relative glass-card p-6 rounded-lg flex items-center group active:scale-[0.98] transition-all duration-300 text-left overflow-hidden">
<!-- Highlight Glow -->
<div class="absolute inset-0 bg-gradient-to-br from-[#FC690A]/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
<div class="w-14 h-14 rounded-2xl bg-primary-container/10 flex items-center justify-center mr-5">
<span class="material-symbols-outlined text-primary-container text-3xl" style="font-variation-settings: 'FILL' 1;">cloud_download</span>
</div>
<div class="flex-1 flex flex-col pr-8">
<div class="flex items-center gap-2 mb-1">
<span class="font-headline font-bold text-lg text-white">Cloud Restore</span>
<div class="bg-green-500/10 text-green-400 px-2 py-0.5 rounded-full text-[10px] font-bold tracking-wider uppercase">FASTEST</div>
</div>
<p class="font-body text-sm text-gray-400">Restore from cloud backup</p>
</div>
<span class="material-symbols-outlined text-white/20 group-hover:text-primary-container transition-colors">chevron_right</span>
</button>
<!-- Card 2: Recovery Phrase -->
<button class="relative glass-card p-6 rounded-lg flex items-center group active:scale-[0.98] transition-all duration-300 text-left">
<div class="w-14 h-14 rounded-2xl bg-white/5 flex items-center justify-center mr-5">
<span class="material-symbols-outlined text-gray-300 text-3xl">description</span>
</div>
<div class="flex-1 flex flex-col pr-8">
<span class="font-headline font-bold text-lg text-white mb-1">Recovery Phrase</span>
<p class="font-body text-sm text-gray-400">Enter recovery phrase</p>
</div>
<span class="material-symbols-outlined text-white/20 group-hover:text-white transition-colors">chevron_right</span>
</button>
</div>
<!-- Bottom Link -->
<div class="mt-12 text-center">
<a class="inline-flex items-center gap-2 text-primary-container font-medium hover:opacity-80 transition-opacity" href="#">
<span class="material-symbols-outlined text-sm">help_outline</span>
<span class="font-body text-sm">What is a recovery phrase?</span>
</a>
</div>
</main>
<!-- Content-driven suppressed FAB and Nav Shell -->
<!-- The page is focused on a linear transaction (Adding a device), so the TopAppBar and BottomNavBar are excluded per hierarchy rules. -->
</body></html>
