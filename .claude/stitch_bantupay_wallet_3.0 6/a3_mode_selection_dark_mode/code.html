<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#FC690A",
                        "base-dark": "#0F0F12",
                        "surface-dark": "#1A1A20",
                        "text-primary-dark": "#F5F5F5",
                        "text-secondary-dark": "#9BA3B4",
                        // Keep Material tokens for compatibility but update values for the new theme
                        "surface-container-high": "#2A2A32",
                        "surface-bright": "#1A1A20",
                        "tertiary-fixed": "#d0e4ff",
                        "surface-container-lowest": "#1A1A20",
                        "on-surface-variant": "#9BA3B4",
                        "outline": "#3F3F46",
                        "on-background": "#F5F5F5",
                        "background": "#0F0F12",
                        "on-primary-fixed-variant": "#7b2f00",
                        "on-secondary-fixed-variant": "#77320b",
                        "surface-dim": "#0F0F12",
                        "secondary-fixed-dim": "#ffb695",
                        "primary-fixed": "#ffdbcc",
                        "on-secondary-container": "#753009",
                        "tertiary-container": "#009cfc",
                        "inverse-surface": "#F5F5F5",
                        "on-surface": "#F5F5F5",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed-dim": "#9ccaff",
                        "on-primary": "#ffffff",
                        "on-primary-container": "#ffffff",
                        "outline-variant": "#3F3F46",
                        "on-tertiary-fixed-variant": "#00497b",
                        "secondary-container": "#FC690A",
                        "on-secondary": "#ffffff",
                        "on-tertiary-fixed": "#001d35",
                        "error": "#ffb4ab",
                        "surface": "#0F0F12",
                        "inverse-on-surface": "#0F0F12",
                        "on-error-container": "#ffdad6",
                        "tertiary": "#9ccaff",
                        "primary-fixed-dim": "#ffb695",
                        "on-secondary-fixed": "#351000",
                        "on-tertiary-container": "#d0e4ff",
                        "surface-tint": "#FC690A",
                        "inverse-primary": "#a23f00",
                        "error-container": "#93000a",
                        "surface-container": "#1A1A20",
                        "primary-container": "#FC690A",
                        "surface-container-low": "#15151A",
                        "secondary-fixed": "#ffdbcc",
                        "secondary": "#ffb695",
                        "surface-variant": "#3F3F46",
                        "on-error": "#690005",
                        "surface-container-highest": "#33333C",
                        "on-primary-fixed": "#351000"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .fill-icon {
            font-variation-settings: 'FILL' 1;
        }
        body {
            background-color: #0F0F12;
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="font-body text-text-primary-dark min-h-screen flex flex-col bg-base-dark">
<!-- Top Navigation Anchor -->
<header class="px-6 py-6 flex items-center justify-between">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-dark text-text-primary-dark hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<!-- Progress Indicator -->
<div class="flex gap-2">
<div class="w-2 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
</div>
<!-- Spacer for centering -->
<div class="w-10"></div>
</header>
<main class="flex-1 px-6 pt-4 flex flex-col">
<!-- Editorial Headline Section -->
<div class="mb-10">
<h1 class="font-headline font-bold text-[28px] leading-tight tracking-tight text-text-primary-dark mb-2">
                What brings you here?
            </h1>
<p class="text-text-secondary-dark font-medium leading-relaxed max-w-[280px]">
                Choose the account type that best fits your needs. You can change this later.
            </p>
</div>
<!-- Mode Cards Container -->
<div class="flex flex-col gap-4">
<!-- Option 1: Personal (Selected) -->
<label class="relative block group cursor-pointer">
<input checked="" class="sr-only" name="mode" type="radio"/>
<div class="flex items-center h-[88px] px-4 rounded-[16px] bg-[#221712] border-2 border-primary transition-all">
<!-- Icon Vessel -->
<div class="w-12 h-12 rounded-xl bg-primary flex items-center justify-center text-white mr-4">
<span class="material-symbols-outlined fill-icon" data-icon="payments">payments</span>
</div>
<!-- Content -->
<div class="flex-1">
<h3 class="font-headline font-bold text-base text-text-primary-dark">Personal</h3>
<p class="text-sm text-text-secondary-dark font-medium">Send and receive money</p>
</div>
<!-- Radio Indicator (Active State) -->
<div class="w-6 h-6 rounded-full border-2 border-primary flex items-center justify-center">
<div class="w-3 h-3 rounded-full bg-primary"></div>
</div>
</div>
</label>
<!-- Option 2: Merchant -->
<label class="relative block group cursor-pointer">
<input class="sr-only" name="mode" type="radio"/>
<div class="flex items-center h-[88px] px-4 rounded-[16px] bg-surface-dark border-2 border-transparent hover:border-surface-container-high transition-all">
<!-- Icon Vessel -->
<div class="w-12 h-12 rounded-xl bg-surface-container-high flex items-center justify-center text-text-secondary-dark mr-4">
<span class="material-symbols-outlined" data-icon="storefront">storefront</span>
</div>
<!-- Content -->
<div class="flex-1">
<h3 class="font-headline font-bold text-base text-text-primary-dark">Merchant</h3>
<p class="text-sm text-text-secondary-dark font-medium">Accept payments at my business</p>
</div>
<!-- Radio Indicator (Inactive State) -->
<div class="w-6 h-6 rounded-full border-2 border-surface-container-highest"></div>
</div>
</label>
<!-- Option 3: Crypto User -->
<label class="relative block group cursor-pointer">
<input class="sr-only" name="mode" type="radio"/>
<div class="flex items-center h-[88px] px-4 rounded-[16px] bg-surface-dark border-2 border-transparent hover:border-surface-container-high transition-all">
<!-- Icon Vessel -->
<div class="w-12 h-12 rounded-xl bg-surface-container-high flex items-center justify-center text-text-secondary-dark mr-4">
<span class="material-symbols-outlined" data-icon="monitoring">monitoring</span>
</div>
<!-- Content -->
<div class="flex-1">
<h3 class="font-headline font-bold text-base text-text-primary-dark">Crypto User</h3>
<p class="text-sm text-text-secondary-dark font-medium">I know what I'm doing</p>
</div>
<!-- Radio Indicator (Inactive State) -->
<div class="w-6 h-6 rounded-full border-2 border-surface-container-highest"></div>
</div>
</label>
</div>
</main>
<!-- Fixed Action Button -->
<footer class="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-base-dark via-base-dark to-transparent">
<button class="w-full h-14 rounded-full bg-primary text-white font-headline font-bold text-base shadow-lg shadow-primary/20 flex items-center justify-center tracking-wide active:scale-95 transition-transform">
            Continue
        </button>
</footer>
</body></html>
