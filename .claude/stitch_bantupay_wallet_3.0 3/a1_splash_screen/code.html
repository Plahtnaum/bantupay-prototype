<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .splash-gradient {
            background: linear-gradient(135deg, #FC690A 0%, #D4560A 100%);
        }
        .concentric-ring {
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 9999px;
            position: absolute;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background font-body overflow-hidden">
<!-- Splash Screen Wrapper (Suppressing Nav Shell as per Task: Transactional/Launch state) -->
<main class="relative h-screen w-full splash-gradient flex flex-col items-center justify-center overflow-hidden">
<!-- Decorative Concentric Rings in bottom-right quadrant -->
<div class="absolute -bottom-24 -right-24 pointer-events-none">
<div class="concentric-ring w-[600px] h-[600px] translate-x-1/4 translate-y-1/4"></div>
<div class="concentric-ring w-[450px] h-[450px] translate-x-1/4 translate-y-1/4"></div>
<div class="concentric-ring w-[300px] h-[300px] translate-x-1/4 translate-y-1/4"></div>
</div>
<!-- Central Content Area -->
<div class="z-10 flex flex-col items-center justify-center mb-[10%]">
<!-- Logo Section -->
<div class="flex flex-col items-center gap-6">
<!-- X Butterfly Icon (White) -->
<div class="w-20 h-20 flex items-center justify-center"><img alt="BantuPay Logo" class="w-20 h-20 object-contain brightness-0 invert" src="https://lh3.googleusercontent.com/aida/ADBb0uix-m67w72OQYa0lR0o-J8243PFXZ3o7LDX3thcGHKZYWW-9u5vSnFeWKvVpqF3v7vrmE3N8A0iGyFJ12jECBgFsdPGYI2kCJg91OQIacazAzSj5YErKOOb5lzllWK09vaywqPKTKIghKklMF4fDOzI4oSfxCJQHvBKl_GyiBk-PhEX3IMgLdTWiIaCYhCrwsDSRULptNFK_4C1dWtGYneFefQXOqJb4swU_eNid03VYr7F5MFuBC9mdT82opzWMagQvhPudCo"/></div>
<!-- Wordmark -->
<h1 class="font-headline font-semibold text-[28px] tracking-tight text-white">
                    BantuPay
                </h1>
</div>
<!-- Tagline -->
<p class="mt-4 font-body text-[15px] text-white/80 tracking-wide font-medium">
                Empowering Humanity
            </p>
</div>
<!-- Pulsing Dots (Loading Indicator) -->
<div class="absolute bottom-16 flex items-center gap-3">
<div class="w-2 h-2 rounded-full bg-white/40 animate-pulse"></div>
<div class="w-2.5 h-2.5 rounded-full bg-white/80 animate-pulse delay-150"></div>
<div class="w-2 h-2 rounded-full bg-white/40 animate-pulse delay-300"></div>
</div>
<!-- Subtle Gradient Texture Overlay -->
<div class="absolute inset-0 bg-gradient-to-tr from-transparent via-transparent to-white/5 pointer-events-none" data-alt="smooth gradient flowing from bright vibrant orange to deep sun-burnt amber with subtle lighting shifts and grain texture">
</div>
</main>
</body></html>
