<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BantuPay - Choose Username</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-high": "#e7e8ec",
                        "surface-bright": "#f8f9fd",
                        "tertiary-fixed": "#d0e4ff",
                        "surface-container-lowest": "#ffffff",
                        "on-surface-variant": "#5a4137",
                        "outline": "#8e7165",
                        "on-background": "#191c1f",
                        "background": "#f8f9fd",
                        "on-primary-fixed-variant": "#7b2f00",
                        "on-secondary-fixed-variant": "#77320b",
                        "surface-dim": "#d9dade",
                        "secondary-fixed-dim": "#ffb695",
                        "primary-fixed": "#ffdbcc",
                        "on-secondary-container": "#753009",
                        "tertiary-container": "#009cfc",
                        "inverse-surface": "#2e3134",
                        "on-surface": "#191c1f",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed-dim": "#9ccaff",
                        "on-primary": "#ffffff",
                        "on-primary-container": "#551e00",
                        "outline-variant": "#e2bfb1",
                        "on-tertiary-fixed-variant": "#00497b",
                        "secondary-container": "#fd9a6c",
                        "on-secondary": "#ffffff",
                        "on-tertiary-fixed": "#001d35",
                        "error": "#ba1a1a",
                        "surface": "#f8f9fd",
                        "inverse-on-surface": "#eff1f5",
                        "on-error-container": "#93000a",
                        "tertiary": "#0062a1",
                        "primary-fixed-dim": "#ffb695",
                        "on-secondary-fixed": "#351000",
                        "on-tertiary-container": "#003155",
                        "surface-tint": "#a23f00",
                        "inverse-primary": "#ffb695",
                        "error-container": "#ffdad6",
                        "surface-container": "#edeef2",
                        "primary": "#a23f00",
                        "surface-container-low": "#f2f3f7",
                        "secondary-fixed": "#ffdbcc",
                        "secondary": "#964921",
                        "surface-variant": "#e1e2e6",
                        "on-error": "#ffffff",
                        "surface-container-highest": "#e1e2e6",
                        "on-primary-fixed": "#351000",
                        "primary-container": "#fc690a"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"],
                        "data": ["JetBrains Mono"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(248, 249, 253, 0.7);
            backdrop-filter: blur(20px);
        }
        body {
            min-height: 100dvh;
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col items-center">
<!-- Top Navigation -->
<header class="w-full max-w-md px-6 pt-8 pb-4 flex items-center justify-between">
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container-low hover:bg-surface-container transition-colors active:scale-95">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<div class="flex flex-col items-end">
<span class="text-on-surface-variant font-label text-[10px] uppercase tracking-widest font-bold">Step 4 of 5</span>
<div class="flex gap-1 mt-1">
<div class="h-1 w-4 rounded-full bg-primary/20"></div>
<div class="h-1 w-4 rounded-full bg-primary/20"></div>
<div class="h-1 w-4 rounded-full bg-primary/20"></div>
<div class="h-1 w-8 rounded-full bg-primary-container"></div>
<div class="h-1 w-4 rounded-full bg-surface-container-highest"></div>
</div>
</div>
</header>
<main class="w-full max-w-md px-6 flex-1 flex flex-col">
<!-- Brand Moment -->
<div class="mt-8 mb-10 flex flex-col items-start">
<div class="relative">
<div class="w-16 h-16 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">alternate_email</span>
</div>
<div class="absolute -top-1 -right-1 w-6 h-6 rounded-full bg-surface-container-highest border-4 border-surface flex items-center justify-center">
<div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
</div>
</div>
<h1 class="mt-8 font-headline text-3xl font-extrabold tracking-tight text-on-surface leading-tight">
                Choose your username
            </h1>
<p class="mt-3 text-on-surface-variant text-base leading-relaxed">
                This will be used for sending and receiving assets across the Bantu ecosystem.
            </p>
</div>
<!-- Form Section -->
<div class="space-y-8">
<div class="space-y-2">
<div class="flex justify-between items-end px-1">
<label class="font-label text-sm font-semibold text-on-surface-variant" for="username">Username</label>
<span class="font-data text-xs text-on-surface-variant opacity-60">5/20</span>
</div>
<div class="relative">
<span class="absolute left-5 top-1/2 -translate-y-1/2 text-on-surface-variant/60 font-body text-lg">@</span>
<input class="w-full h-14 pl-10 pr-5 rounded-full bg-surface-container-low border-none focus:ring-2 focus:ring-primary/40 text-on-surface font-body text-lg placeholder:text-on-surface-variant/40 transition-all" id="username" placeholder="username" type="text" value="amara"/>
</div>
</div>
<!-- Bento Preview Card -->
<div class="p-6 rounded-lg bg-surface-container-lowest border border-outline-variant/10 shadow-sm relative overflow-hidden group">
<div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
<span class="material-symbols-outlined text-6xl">link</span>
</div>
<div class="relative z-10">
<p class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest mb-3">Your BantuPay link will be:</p>
<div class="flex items-center gap-2">
<span class="text-primary-container material-symbols-outlined text-base">alternate_email</span>
<span class="font-data text-primary text-lg tracking-tight font-medium">bantupay.link/amara</span>
</div>
</div>
<!-- Abstract Decorative Element -->
<div class="absolute -bottom-12 -left-12 w-32 h-32 bg-primary/5 rounded-full blur-3xl"></div>
</div>
</div>
<!-- Spacing for bottom balance -->
<div class="flex-1"></div>
</main>
<!-- Fixed Action Bar -->
<footer class="w-full max-w-md p-6 bg-surface/80 backdrop-blur-md sticky bottom-0">
<button class="w-full h-14 rounded-full bg-gradient-to-br from-[#FC690A] to-[#D4560A] text-white font-headline font-bold text-lg shadow-lg shadow-primary-container/20 active:scale-95 transition-all flex items-center justify-center gap-2">
            Continue
            <span class="material-symbols-outlined text-xl">east</span>
</button>
</footer>
</body></html>
