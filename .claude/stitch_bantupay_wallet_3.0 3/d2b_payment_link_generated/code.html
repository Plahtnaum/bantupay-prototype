<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

            "secondary-fixed": "#ffdbcc",
            "inverse-surface": "#2e3134",

            "inverse-primary": "#ffb695",
            "primary-container": "#fc690a",
            "on-background": "#191c1f",

            "on-tertiary-fixed-variant": "#00497b",
            "inverse-on-surface": "#eff1f5",
            "tertiary-fixed-dim": "#9ccaff",

<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .glass-effect {
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body text-on-background min-h-screen overflow-hidden">
<!-- Underlying Receive Screen Content -->
<header class="fixed top-0 w-full z-50 bg-[#F5F6FA]/80 backdrop-blur-xl">
<div class="flex items-center justify-between px-6 h-16 w-full max-w-screen-xl mx-auto">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-slate-100 transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-[#FC690A]">arrow_back</span>
</button>
<h1 class="text-[#FC690A] font-['Plus_Jakarta_Sans'] font-bold tracking-tight text-lg">Receive Funds</h1>
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-slate-100 transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-[#FC690A]">more_vert</span>
</button>
</div>
</header>
<main class="pt-24 pb-20 px-6 max-w-md mx-auto space-y-8">
<!-- Static background elements to simulate the screen beneath -->
<div class="bg-surface-container-low p-6 rounded-xl space-y-4">
<div class="h-4 w-24 bg-surface-variant rounded"></div>
<div class="h-12 w-full bg-surface-container rounded-lg"></div>
<div class="h-4 w-32 bg-surface-variant rounded"></div>
<div class="h-12 w-full bg-surface-container rounded-lg"></div>
</div>
</main>
<!-- Bottom Nav Bar (Background) -->
<nav class="fixed bottom-0 w-full z-40 bg-[#F5F6FA]/90 backdrop-blur-2xl rounded-t-[32px] shadow-[0_-4px_24px_rgba(0,0,0,0.04)]">
<div class="flex justify-around items-center h-20 px-4 pb-safe w-full">
<div class="flex flex-col items-center justify-center text-slate-400">
<span class="material-symbols-outlined">grid_view</span>
<span class="font-['Inter'] text-[11px] font-medium mt-1">Home</span>
</div>
<div class="flex flex-col items-center justify-center text-[#FC690A] font-bold scale-110">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
<span class="font-['Inter'] text-[11px] font-medium mt-1">Assets</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400">
<span class="material-symbols-outlined">receipt_long</span>
<span class="font-['Inter'] text-[11px] font-medium mt-1">Activity</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400">
<span class="material-symbols-outlined">settings</span>
<span class="font-['Inter'] text-[11px] font-medium mt-1">Settings</span>
</div>
</div>
</nav>
<!-- Overlay Scrim -->
<div class="fixed inset-0 bg-on-surface/40 backdrop-blur-[2px] z-[60]"></div>
<!-- Slide-up Bottom Sheet -->
<div class="fixed bottom-0 left-0 right-0 z-[70] bg-surface-container-lowest rounded-t-xl max-w-screen-md mx-auto shadow-2xl transition-transform transform translate-y-0">
<!-- Drag Handle -->
<div class="flex justify-center pt-3 pb-2">
<div class="w-10 h-1.5 bg-surface-variant rounded-full"></div>
</div>
<div class="px-8 pb-12 pt-4 flex flex-col items-center text-center">
<!-- Title/Amount Label -->
<div class="mb-8">
<p class="text-on-surface-variant font-label text-sm font-medium mb-1">Requesting</p>
<div class="flex items-baseline justify-center gap-2">
<span class="text-3xl font-headline font-extrabold tracking-tight text-on-surface">1,250.00</span>
<span class="text-xl font-headline font-bold text-primary-container">BNT</span>
</div>
</div>
<!-- QR Code Section -->
<div class="relative p-6 bg-surface-container-low rounded-xl mb-8 group">
<div class="absolute inset-0 bg-gradient-to-br from-primary-container/10 to-transparent rounded-xl"></div>
<img alt="Payment QR Code" class="w-48 h-48 relative z-10" data-alt="A clean minimalist QR code generated on a white background with rounded corners for a digital wallet payment request" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCplyCge5G8ogmJHPD2pTfxHYVAbfq7ymPo8qXwd3JrZkhrj0bffKhGSja9LBc3-6nhB35wGEp4GVoiUpMb37__UdZ7eqrPn_53KQkWhn8NgRPJIVrQO-M4ctKWuIjAvbTD52RCjpDFTKmIkp-AU3p3E689k-oqksHvuXBngrRhrwckqvddsz_yJ8o7VPROrEiEz6Tg_wY_xwOniJrOwnEkyRJn9HvO8IPKepwGYUtJRnq__VeQTiSIGMBH-ks_voMCYpbh-8qfJA"/>
<!-- Brand Watermark on QR -->
<div class="absolute inset-0 flex items-center justify-center z-20 pointer-events-none">
<div class="bg-surface-container-lowest p-2 rounded-lg shadow-sm">
<span class="material-symbols-outlined text-primary-container text-2xl" style="font-variation-settings: 'FILL' 1;">bolt</span>
</div>
</div>
</div>
<!-- Link Box -->
<div class="w-full bg-surface-container-low rounded-lg p-4 mb-8 flex items-center justify-between gap-4">
<div class="flex-1 overflow-hidden">
<p class="text-xs text-on-surface-variant font-label mb-0.5 text-left">BantuPay Link</p>
<p class="font-['JetBrains_Mono'] text-sm text-on-surface truncate">bantupay.link/pay/rq-827k-99x</p>
</div>
<button class="bg-surface-container-highest text-on-surface p-2.5 rounded-lg active:scale-90 transition-transform">
<span class="material-symbols-outlined text-xl">content_copy</span>
</button>
</div>
<!-- Action Row -->
<div class="grid grid-cols-3 gap-4 w-full mb-10">
<button class="flex flex-col items-center gap-2 group">
<div class="w-14 h-14 rounded-full bg-surface-container-low flex items-center justify-center group-active:scale-90 transition-all text-on-surface-variant group-hover:bg-primary-container/10 group-hover:text-primary-container">
<span class="material-symbols-outlined text-2xl">link</span>
</div>
<span class="text-xs font-medium font-label">Copy Link</span>
</button>
<button class="flex flex-col items-center gap-2 group">
<div class="w-14 h-14 rounded-full bg-surface-container-low flex items-center justify-center group-active:scale-90 transition-all text-[#25D366]">
<span class="material-symbols-outlined text-2xl">chat</span>
</div>
<span class="text-xs font-medium font-label">WhatsApp</span>
</button>
<button class="flex flex-col items-center gap-2 group">
<div class="w-14 h-14 rounded-full bg-surface-container-low flex items-center justify-center group-active:scale-90 transition-all text-on-surface-variant group-hover:bg-primary-container/10 group-hover:text-primary-container">
<span class="material-symbols-outlined text-2xl">share</span>
</div>
<span class="text-xs font-medium font-label">Share</span>
</button>
</div>
<!-- Primary Action -->
<button class="w-full h-14 rounded-full bg-gradient-to-r from-[#FC690A] to-[#D4560A] text-white font-headline font-bold text-lg shadow-brand active:scale-[0.98] transition-transform">
        Done
      </button>
</div>
</div>
</body></html>
