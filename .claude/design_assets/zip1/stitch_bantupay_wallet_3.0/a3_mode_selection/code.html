<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-high": "#e7e8ec",
                        "surface-bright": "#f8f9fd",
                        "tertiary-fixed": "#d0e4ff",
                        "surface-container-lowest": "#ffffff",
                        "on-surface-variant": "#5a4137",
                        "outline": "#8e7165",
                        "on-background": "#191c1f",
                        "background": "#f8f9fd",
                        "on-primary-fixed-variant": "#7b2f00",
                        "on-secondary-fixed-variant": "#77320b",
                        "surface-dim": "#d9dade",
                        "secondary-fixed-dim": "#ffb695",
                        "primary-fixed": "#ffdbcc",
                        "on-secondary-container": "#753009",
                        "tertiary-container": "#009cfc",
                        "inverse-surface": "#2e3134",
                        "on-surface": "#191c1f",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed-dim": "#9ccaff",
                        "on-primary": "#ffffff",
                        "on-primary-container": "#551e00",
                        "outline-variant": "#e2bfb1",
                        "on-tertiary-fixed-variant": "#00497b",
                        "secondary-container": "#fd9a6c",
                        "on-secondary": "#ffffff",
                        "on-tertiary-fixed": "#001d35",
                        "error": "#ba1a1a",
                        "surface": "#f8f9fd",
                        "inverse-on-surface": "#eff1f5",
                        "on-error-container": "#93000a",
                        "tertiary": "#0062a1",
                        "primary-fixed-dim": "#ffb695",
                        "on-secondary-fixed": "#351000",
                        "on-tertiary-container": "#003155",
                        "surface-tint": "#a23f00",
                        "inverse-primary": "#ffb695",
                        "error-container": "#ffdad6",
                        "surface-container": "#edeef2",
                        "primary": "#a23f00",
                        "surface-container-low": "#f2f3f7",
                        "secondary-fixed": "#ffdbcc",
                        "secondary": "#964921",
                        "surface-variant": "#e1e2e6",
                        "on-error": "#ffffff",
                        "surface-container-highest": "#e1e2e6",
                        "on-primary-fixed": "#351000",
                        "primary-container": "#fc690a"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .fill-icon {
            font-variation-settings: 'FILL' 1;
        }
        body {
            background-color: #F5F6FA;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="font-body text-on-surface min-h-screen flex flex-col">
<!-- Top Navigation Anchor (Suppressing Shared Nav as per focused journey rule) -->
<header class="px-6 py-6 flex items-center justify-between">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-lowest text-on-surface hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<!-- Progress Indicator -->
<div class="flex gap-2">
<div class="w-2 h-2 rounded-full bg-primary-container"></div>
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
</div>
<!-- Spacer for centering -->
<div class="w-10"></div>
</header>
<main class="flex-1 px-6 pt-4 flex flex-col">
<!-- Editorial Headline Section -->
<div class="mb-10">
<h1 class="font-headline font-bold text-[28px] leading-tight tracking-tight text-on-surface mb-2">
                What brings you here?
            </h1>
<p class="text-on-surface-variant font-medium leading-relaxed max-w-[280px]">
                Choose the account type that best fits your needs. You can change this later.
            </p>
</div>
<!-- Mode Cards Container (No dividers, just space) -->
<div class="flex flex-col gap-4">
<!-- Option 1: Personal (Selected) -->
<label class="relative block group cursor-pointer">
<input checked="" class="sr-only" name="mode" type="radio"/>
<div class="flex items-center h-[88px] px-4 rounded-[16px] bg-[#FFF5F0] border-2 border-primary-container transition-all">
<!-- Icon Vessel -->
<div class="w-12 h-12 rounded-xl bg-primary-container flex items-center justify-center text-on-primary mr-4">
<span class="material-symbols-outlined fill-icon" data-icon="payments">payments</span>
</div>
<!-- Content -->
<div class="flex-1">
<h3 class="font-headline font-bold text-base text-on-surface">Personal</h3>
<p class="text-sm text-on-surface-variant font-medium">Send and receive money</p>
</div>
<!-- Radio Indicator (Active State) -->
<div class="w-6 h-6 rounded-full border-2 border-primary-container flex items-center justify-center">
<div class="w-3 h-3 rounded-full bg-primary-container"></div>
</div>
</div>
</label>
<!-- Option 2: Merchant -->
<label class="relative block group cursor-pointer">
<input class="sr-only" name="mode" type="radio"/>
<div class="flex items-center h-[88px] px-4 rounded-[16px] bg-surface-container-lowest border-2 border-transparent hover:border-surface-container-high transition-all">
<!-- Icon Vessel -->
<div class="w-12 h-12 rounded-xl bg-surface-container-low flex items-center justify-center text-on-surface-variant mr-4">
<span class="material-symbols-outlined" data-icon="storefront">storefront</span>
</div>
<!-- Content -->
<div class="flex-1">
<h3 class="font-headline font-bold text-base text-on-surface">Merchant</h3>
<p class="text-sm text-on-surface-variant font-medium">Accept payments at my business</p>
</div>
<!-- Radio Indicator (Inactive State) -->
<div class="w-6 h-6 rounded-full border-2 border-surface-container-highest"></div>
</div>
</label>
<!-- Option 3: Crypto User -->
<label class="relative block group cursor-pointer">
<input class="sr-only" name="mode" type="radio"/>
<div class="flex items-center h-[88px] px-4 rounded-[16px] bg-surface-container-lowest border-2 border-transparent hover:border-surface-container-high transition-all">
<!-- Icon Vessel -->
<div class="w-12 h-12 rounded-xl bg-surface-container-low flex items-center justify-center text-on-surface-variant mr-4">
<span class="material-symbols-outlined" data-icon="monitoring">monitoring</span>
</div>
<!-- Content -->
<div class="flex-1">
<h3 class="font-headline font-bold text-base text-on-surface">Crypto User</h3>
<p class="text-sm text-on-surface-variant font-medium">I know what I'm doing</p>
</div>
<!-- Radio Indicator (Inactive State) -->
<div class="w-6 h-6 rounded-full border-2 border-surface-container-highest"></div>
</div>
</label>
</div>
<!-- Visual Aesthetic Moment -->
</main>
<!-- Fixed Action Button (Suppressed standard FAB for focused transaction button) -->
<footer class="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-[#F5F6FA] via-[#F5F6FA] to-transparent">
<button class="w-full h-14 rounded-full bg-gradient-to-r from-primary-container to-[#D4560A] text-white font-headline font-bold text-base shadow-brand flex items-center justify-center tracking-wide active:scale-95 transition-transform">
            Continue
        </button>
</footer>
</body></html>
