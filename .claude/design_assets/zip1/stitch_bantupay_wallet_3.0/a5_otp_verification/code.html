<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .otp-dot {
            width: 8px;
            height: 8px;
            background-color: #191c1f;
            border-radius: 50%;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-high": "#e7e8ec",
                        "surface-bright": "#f8f9fd",
                        "tertiary-fixed": "#d0e4ff",
                        "surface-container-lowest": "#ffffff",
                        "on-surface-variant": "#5a4137",
                        "outline": "#8e7165",
                        "on-background": "#191c1f",
                        "background": "#f8f9fd",
                        "on-primary-fixed-variant": "#7b2f00",
                        "on-secondary-fixed-variant": "#77320b",
                        "surface-dim": "#d9dade",
                        "secondary-fixed-dim": "#ffb695",
                        "primary-fixed": "#ffdbcc",
                        "on-secondary-container": "#753009",
                        "tertiary-container": "#009cfc",
                        "inverse-surface": "#2e3134",
                        "on-surface": "#191c1f",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed-dim": "#9ccaff",
                        "on-primary": "#ffffff",
                        "on-primary-container": "#551e00",
                        "outline-variant": "#e2bfb1",
                        "on-tertiary-fixed-variant": "#00497b",
                        "secondary-container": "#fd9a6c",
                        "on-secondary": "#ffffff",
                        "on-tertiary-fixed": "#001d35",
                        "error": "#ba1a1a",
                        "surface": "#f8f9fd",
                        "inverse-on-surface": "#eff1f5",
                        "on-error-container": "#93000a",
                        "tertiary": "#0062a1",
                        "primary-fixed-dim": "#ffb695",
                        "on-secondary-fixed": "#351000",
                        "on-tertiary-container": "#003155",
                        "surface-tint": "#a23f00",
                        "inverse-primary": "#ffb695",
                        "error-container": "#ffdad6",
                        "surface-container": "#edeef2",
                        "primary": "#a23f00",
                        "surface-container-low": "#f2f3f7",
                        "secondary-fixed": "#ffdbcc",
                        "secondary": "#964921",
                        "surface-variant": "#e1e2e6",
                        "on-error": "#ffffff",
                        "surface-container-highest": "#e1e2e6",
                        "on-primary-fixed": "#351000",
                        "primary-container": "#fc690a"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"],
                        "data": ["JetBrains Mono"]

                },
            },
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-[#F5F6FA] text-on-surface font-body min-h-screen flex flex-col items-center">
<div class="w-full max-w-md min-h-screen flex flex-col bg-[#F5F6FA] relative overflow-hidden">
<!-- Header / Navigation -->
<header class="flex items-center justify-between px-6 py-6 z-10">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-lowest text-on-surface hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div class="flex flex-col items-center">
<span class="text-[10px] font-bold tracking-widest text-on-surface-variant uppercase opacity-50 mb-1">Step 3 of 5</span>
<div class="flex gap-1.5">
<div class="w-6 h-1 rounded-full bg-primary"></div>
<div class="w-6 h-1 rounded-full bg-primary"></div>
<div class="w-6 h-1 rounded-full bg-primary"></div>
<div class="w-6 h-1 rounded-full bg-surface-container-highest"></div>
<div class="w-6 h-1 rounded-full bg-surface-container-highest"></div>
</div>
</div>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col px-8 pt-12 items-center text-center">
<!-- Animated Kinetic Icon -->
<div class="relative mb-10">
<div class="absolute inset-0 bg-primary opacity-10 blur-2xl rounded-full scale-150"></div>
<div class="relative w-20 h-20 bg-surface-container-lowest rounded-full flex items-center justify-center shadow-sm">
<div class="w-14 h-14 bg-primary/5 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="chat">chat</span>
</div>
</div>
</div>
<!-- Typography Content -->
<div class="space-y-3 mb-12">
<h1 class="text-3xl font-headline font-extrabold tracking-tight text-on-surface">Enter the code</h1>
<p class="text-on-surface-variant leading-relaxed px-4">
                    We've sent a 6-digit verification code to <br/>
<span class="font-data font-medium text-on-surface">+234 803 ••• ••89</span>
</p>
<a class="inline-block text-primary font-semibold text-sm hover:opacity-80 transition-opacity" href="#">Change number</a>
</div>
<!-- OTP Input Field Logic -->
<div class="flex justify-center mb-8 px-4">
<!-- Field 1: Filled -->
<div class="w-14 h-16 bg-surface-container-lowest rounded-[12px] flex items-center justify-center border-2 border-transparent">
<div class="otp-dot"></div>
</div>
<!-- Field 2: Filled -->
<div class="w-14 h-16 bg-surface-container-lowest rounded-[12px] flex items-center justify-center border-2 border-transparent">
<div class="otp-dot"></div>
</div>
<!-- Field 3: Filled -->
<div class="w-14 h-16 bg-surface-container-lowest rounded-[12px] flex items-center justify-center border-2 border-transparent">
<div class="otp-dot"></div>
</div>
<!-- Field 4: Active -->
<div class="w-14 h-16 bg-surface-container-lowest rounded-[12px] flex items-center justify-center border-2 border-primary shadow-[0_0_15px_rgba(252,105,10,0.15)]">
<div class="w-[2px] h-6 bg-primary animate-pulse"></div>
</div>
<!-- Field 5: Empty -->
<div class="w-14 h-16 bg-surface-container-lowest rounded-[12px] flex items-center justify-center border-2 border-transparent"></div>
<!-- Field 6: Empty -->
<div class="w-14 h-16 bg-surface-container-lowest rounded-[12px] flex items-center justify-center border-2 border-transparent"></div>
</div>
<!-- Action Area -->
<div class="w-full space-y-6">
<div class="flex flex-col items-center gap-1">
<p class="text-sm text-on-surface-variant">Resend code in <span class="font-data font-bold text-on-surface">0:28</span></p>
</div>
<div class="pt-4 border-t border-surface-container-high/50 flex flex-col gap-4">
<button class="w-full h-14 bg-surface-container-low text-on-surface font-semibold rounded-full hover:bg-surface-container-high transition-all flex items-center justify-center gap-3">
<span class="material-symbols-outlined" data-icon="chat_bubble">chat_bubble</span>
                        Try WhatsApp OTP
                    </button>
<p class="text-xs text-on-surface-variant/60 px-8">
                        By continuing, you agree to our security protocols for multi-factor authentication.
                    </p>
</div>
</div>
</main>
<!-- Decorative Kinetic Elements -->
<div class="absolute -bottom-20 -left-20 w-64 h-64 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="absolute top-40 -right-20 w-48 h-48 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<!-- Sticky Footer CTA (Optional but helps layout) -->
<footer class="p-8 mt-auto">
<button class="w-full h-14 bg-gradient-to-br from-[#FC690A] to-[#D4560A] text-white font-bold rounded-full shadow-lg shadow-primary/20 flex items-center justify-center gap-2 hover:scale-[1.02] active:scale-[0.98] transition-transform">
                Verify Identity
                <span class="material-symbols-outlined" data-icon="chevron_right">chevron_right</span>
</button>
</footer>
</div>
<!-- Image for Contextual Background (Hidden but included for design system prompt) -->
<div class="hidden">
<img alt="Security Viz" data-alt="Abstract digital network visualization with flowing orange and blue particles on a dark sophisticated background representing secure encryption" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCH_0rtod-sRPK7sqkSIV8ci2MuYQS5F2sEFz8x81YsxFfxWSQKIGIimN_eKZxAvdJZ-9esuh-nBzRS7vms85yqouvW9iwRmu4RWCGEaoITotlyx5sDgRpKf-0u11Sn_k6xzL39W9vZwmOy68o1IxxheywECWr7HT_JMs_9k16n0rGZSr7Un48N3FqMAaG4rDwH4nWH08OTQa5IInVE6V_ipgIvfWnyE-VDxOPJGDZ_yc61vWlFfw9QWbUiDZ23mrccILFYyz0z4w"/>
</div>
</body></html>
