<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BantuPay 3.0 - Send Assets</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-lowest": "#ffffff",
                        "primary": "#a23f00",
                        "secondary-container": "#fd9a6c",
                        "surface-container-high": "#e7e8ec",
                        "background": "#f8f9fd",
                        "on-primary": "#ffffff",
                        "tertiary": "#0062a1",
                        "tertiary-fixed-dim": "#9ccaff",
                        "on-primary-container": "#551e00",
                        "on-background": "#191c1f",
                        "on-primary-fixed-variant": "#7b2f00",
                        "on-error-container": "#93000a",
                        "surface-bright": "#f8f9fd",
                        "inverse-primary": "#ffb695",
                        "secondary": "#964921",
                        "surface": "#f8f9fd",
                        "on-primary-fixed": "#351000",
                        "inverse-on-surface": "#eff1f5",
                        "surface-dim": "#d9dade",
                        "on-secondary": "#ffffff",
                        "on-surface": "#191c1f",
                        "on-tertiary-container": "#003155",
                        "primary-fixed": "#ffdbcc",
                        "on-secondary-fixed": "#351000",
                        "tertiary-container": "#009cfc",
                        "outline-variant": "#e2bfb1",
                        "surface-container-low": "#f2f3f7",
                        "error-container": "#ffdad6",
                        "inverse-surface": "#2e3134",
                        "outline": "#8e7165",
                        "error": "#ba1a1a",
                        "surface-container-highest": "#e1e2e6",
                        "on-tertiary": "#ffffff",
                        "secondary-fixed-dim": "#ffb695",
                        "on-error": "#ffffff",
                        "surface-container": "#edeef2",
                        "on-surface-variant": "#5a4137",
                        "on-secondary-container": "#753009",
                        "surface-variant": "#e1e2e6",
                        "tertiary-fixed": "#d0e4ff",
                        "surface-tint": "#a23f00",
                        "on-tertiary-fixed": "#001d35",
                        "primary-container": "#fc690a",
                        "on-secondary-fixed-variant": "#77320b",
                        "primary-fixed-dim": "#ffb695",
                        "on-tertiary-fixed-variant": "#00497b",
                        "secondary-fixed": "#ffdbcc"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"],
                        "mono": ["JetBrains Mono"]
                    }
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Plus Jakarta Sans', sans-serif; }
        .mono-text { font-family: 'JetBrains Mono', monospace; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex justify-center items-start">
<div class="relative flex h-[932px] w-[430px] flex-col bg-background shadow-2xl overflow-hidden">
<!-- Header: Minimal Back-to-Main Exception -->
<div class="flex items-center justify-between p-6">
<button class="flex items-center justify-center size-10 rounded-full bg-surface-container-low text-on-surface">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-on-surface text-lg font-bold">Send Assets</h2>
<!-- Redesigned Asset Dropdown Chip -->
<button class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-surface-container-high border border-outline-variant/15 text-on-surface-variant hover:bg-surface-container-highest transition-colors">
<div class="flex items-center gap-1.5">
<div class="size-5 rounded-full bg-primary-container flex items-center justify-center text-on-primary text-[10px] font-bold">₦</div>
<span class="text-sm font-semibold tracking-tight">cNGN</span>
</div>
<span class="material-symbols-outlined text-[18px]">keyboard_arrow_down</span>
</button>
</div>
<!-- Amount Display Section -->
<div class="flex-1 flex flex-col items-center justify-center px-6">
<div class="w-full text-center space-y-2">
<p class="text-on-surface-variant text-sm font-medium uppercase tracking-widest">Enter Amount</p>
<div class="flex items-baseline justify-center gap-2">
<span class="mono-text text-primary text-5xl font-bold">45,000.</span>
<span class="mono-text text-on-surface-variant/40 text-4xl font-bold">00</span>
</div>
<p class="text-secondary font-medium tracking-tight">Nigerian Naira</p>
</div>
<!-- Context Note (Subtle Layering) -->
<div class="mt-8 px-4 py-2 rounded-full bg-surface-container-low flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-sm" style="font-variation-settings: 'FILL' 1;">info</span>
<span class="text-xs text-on-surface-variant">Balance: 124,500.00 cNGN</span>
</div>
</div>
<!-- Numpad Area (Kinetic Tonal Layering) -->
<div class="bg-surface-container-low/50 rounded-t-xl p-6 pb-12">
<div class="grid grid-cols-3 gap-3">
<!-- Numbers 1-9 -->
<button class="flex h-16 items-center justify-center rounded-2xl bg-surface-container-lowest text-on-surface text-2xl font-bold shadow-sm active:scale-95 transition-transform">1</button>
<button class="flex h-16 items-center justify-center rounded-2xl bg-surface-container-lowest text-on-surface text-2xl font-bold shadow-sm active:scale-95 transition-transform">2</button>
<button class="flex h-16 items-center justify-center rounded-2xl bg-surface-container-lowest text-on-surface text-2xl font-bold shadow-sm active:scale-95 transition-transform">3</button>
<button class="flex h-16 items-center justify-center rounded-2xl bg-surface-container-lowest text-on-surface text-2xl font-bold shadow-sm active:scale-95 transition-transform">4</button>
<button class="flex h-16 items-center justify-center rounded-2xl bg-surface-container-lowest text-on-surface text-2xl font-bold shadow-sm active:scale-95 transition-transform">5</button>
<button class="flex h-16 items-center justify-center rounded-2xl bg-surface-container-lowest text-on-surface text-2xl font-bold shadow-sm active:scale-95 transition-transform">6</button>
<button class="flex h-16 items-center justify-center rounded-2xl bg-surface-container-lowest text-on-surface text-2xl font-bold shadow-sm active:scale-95 transition-transform">7</button>
<button class="flex h-16 items-center justify-center rounded-2xl bg-surface-container-lowest text-on-surface text-2xl font-bold shadow-sm active:scale-95 transition-transform">8</button>
<button class="flex h-16 items-center justify-center rounded-2xl bg-surface-container-lowest text-on-surface text-2xl font-bold shadow-sm active:scale-95 transition-transform">9</button>
<button class="flex h-16 items-center justify-center rounded-2xl bg-surface-container-lowest text-on-surface text-2xl font-bold shadow-sm active:scale-95 transition-transform">.</button>
<button class="flex h-16 items-center justify-center rounded-2xl bg-surface-container-lowest text-on-surface text-2xl font-bold shadow-sm active:scale-95 transition-transform">0</button>
<button class="flex h-16 items-center justify-center rounded-2xl bg-surface-container-lowest text-on-surface text-2xl font-bold shadow-sm active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="backspace">backspace</span>
</button>
</div>
<!-- Primary CTA: The Kinetic Pill -->
<button class="mt-8 w-full h-14 flex items-center justify-center gap-2 rounded-full bg-gradient-to-br from-primary-container to-secondary text-on-primary font-bold text-lg shadow-[0_12px_24px_-8px_rgba(252,105,10,0.3)]">
<span>Continue</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
<!-- Screen Decorative Element: Subtle Gradient Glow -->
<div class="absolute -top-24 -right-24 size-64 bg-primary/5 rounded-full blur-[80px] pointer-events-none"></div>
<div class="absolute -bottom-24 -left-24 size-64 bg-secondary/5 rounded-full blur-[80px] pointer-events-none"></div>
</div>
</body></html>
