<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@500&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "bg-base-dark": "#0F0F12",
                        "bg-surface-dark": "#1A1A20",
                        "text-primary-dark": "#F5F5F5",
                        "text-secondary-dark": "#9BA3B4",
                        "brand-orange": "#FC690A",
                        "surface-container-high": "#2A2A32",
                        "surface-bright": "#1A1A20",
                        "tertiary-fixed": "#d0e4ff",
                        "surface-container-lowest": "#0F0F12",
                        "on-surface-variant": "#9BA3B4",
                        "outline": "#3F3F46",
                        "on-background": "#F5F5F5",
                        "background": "#0F0F12",
                        "surface-dim": "#141419",
                        "primary-fixed": "#ffdbcc",
                        "inverse-surface": "#F5F5F5",
                        "on-surface": "#F5F5F5",
                        "on-tertiary": "#ffffff",
                        "on-primary": "#ffffff",
                        "outline-variant": "#3F3F46",
                        "secondary-container": "#2A2A32",
                        "on-secondary": "#ffffff",
                        "error": "#ffb4ab",
                        "surface": "#0F0F12",
                        "inverse-on-surface": "#0F0F12",
                        "tertiary": "#9ccaff",
                        "surface-tint": "#FC690A",
                        "inverse-primary": "#FC690A",
                        "error-container": "#93000a",
                        "surface-container": "#1A1A20",
                        "primary": "#FC690A",
                        "surface-container-low": "#141419",
                        "secondary": "#9BA3B4",
                        "surface-variant": "#2A2A32",
                        "on-error": "#690005",
                        "surface-container-highest": "#3F3F46",
                        "primary-container": "#FC690A"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"],
                        "data": ["JetBrains Mono"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0F0F12;
            color: #F5F5F5;
        }
        .numpad-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="text-on-surface min-h-screen flex flex-col bg-bg-base-dark">
<!-- Top Navigation -->
<header class="fixed top-0 w-full z-50 bg-bg-base-dark/80 backdrop-blur-xl px-6 py-4 flex justify-between items-center">
<div class="flex items-center gap-3">
<button class="p-2 -ml-2 rounded-full active:bg-bg-surface-dark transition-colors">
<span class="material-symbols-outlined text-text-primary-dark">arrow_back</span>
</button>
<h1 class="text-xl font-bold font-headline tracking-tight text-text-primary-dark">Send</h1>
</div>
<!-- Asset Selector Dropdown -->
<button class="flex items-center gap-2 bg-bg-surface-dark px-3 py-1.5 rounded-full border border-outline-variant/20 hover:bg-surface-container-high transition-colors active:scale-95">
<div class="w-5 h-5 rounded-full bg-brand-orange flex items-center justify-center">
<span class="material-symbols-outlined text-[12px] text-white" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
</div>
<span class="text-sm font-bold font-headline text-text-primary-dark">cNGN</span>
<span class="material-symbols-outlined text-sm text-text-secondary-dark">keyboard_arrow_down</span>
</button>
</header>
<main class="flex-grow pt-20 pb-32 flex flex-col px-6">
<!-- Amount Area -->
<section class="flex flex-col items-center justify-center flex-grow py-8 text-center">
<div class="flex flex-col items-center gap-1">
<div class="flex items-baseline gap-2">
<span class="text-[56px] font-extrabold font-headline leading-none text-text-primary-dark tracking-tighter">0</span>
<span class="text-2xl font-bold font-headline text-text-secondary-dark">cNGN</span>
</div>
<div class="mt-4 px-4 py-1.5 rounded-full bg-bg-surface-dark border border-outline-variant/10">
<span class="text-sm font-medium font-data text-text-secondary-dark">≈ ₦0.00</span>
</div>
</div>
</section>
<!-- Numeric Numpad -->
<section class="mt-auto pt-8">
<div class="numpad-grid">
<button class="h-16 flex items-center justify-center rounded-2xl active:bg-bg-surface-dark transition-colors">
<span class="text-2xl font-bold font-headline text-text-primary-dark">1</span>
</button>
<button class="h-16 flex items-center justify-center rounded-2xl active:bg-bg-surface-dark transition-colors">
<span class="text-2xl font-bold font-headline text-text-primary-dark">2</span>
</button>
<button class="h-16 flex items-center justify-center rounded-2xl active:bg-bg-surface-dark transition-colors">
<span class="text-2xl font-bold font-headline text-text-primary-dark">3</span>
</button>
<button class="h-16 flex items-center justify-center rounded-2xl active:bg-bg-surface-dark transition-colors">
<span class="text-2xl font-bold font-headline text-text-primary-dark">4</span>
</button>
<button class="h-16 flex items-center justify-center rounded-2xl active:bg-bg-surface-dark transition-colors">
<span class="text-2xl font-bold font-headline text-text-primary-dark">5</span>
</button>
<button class="h-16 flex items-center justify-center rounded-2xl active:bg-bg-surface-dark transition-colors">
<span class="text-2xl font-bold font-headline text-text-primary-dark">6</span>
</button>
<button class="h-16 flex items-center justify-center rounded-2xl active:bg-bg-surface-dark transition-colors">
<span class="text-2xl font-bold font-headline text-text-primary-dark">7</span>
</button>
<button class="h-16 flex items-center justify-center rounded-2xl active:bg-bg-surface-dark transition-colors">
<span class="text-2xl font-bold font-headline text-text-primary-dark">8</span>
</button>
<button class="h-16 flex items-center justify-center rounded-2xl active:bg-bg-surface-dark transition-colors">
<span class="text-2xl font-bold font-headline text-text-primary-dark">9</span>
</button>
<button class="h-16 flex items-center justify-center rounded-2xl active:bg-bg-surface-dark transition-colors">
<span class="text-2xl font-bold font-headline text-text-primary-dark">.</span>
</button>
<button class="h-16 flex items-center justify-center rounded-2xl active:bg-bg-surface-dark transition-colors">
<span class="text-2xl font-bold font-headline text-text-primary-dark">0</span>
</button>
<button class="h-16 flex items-center justify-center rounded-2xl active:bg-bg-surface-dark transition-colors">
<span class="material-symbols-outlined text-2xl text-text-primary-dark">backspace</span>
</button>
</div>
</section>
</main>
<!-- Bottom Action Area -->
<footer class="fixed bottom-0 left-0 w-full p-6 bg-bg-base-dark/90 backdrop-blur-2xl">
<button class="w-full h-14 bg-bg-surface-dark text-text-secondary-dark font-bold font-headline rounded-full opacity-50 flex items-center justify-center gap-2 cursor-not-allowed" disabled="">
        Continue
        <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</footer>
</body></html>
