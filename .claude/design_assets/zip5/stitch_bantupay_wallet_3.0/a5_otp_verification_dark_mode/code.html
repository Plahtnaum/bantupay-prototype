<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .otp-dot {
            width: 8px;
            height: 8px;
            background-color: #F5F5F5;
            border-radius: 50%;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#FC690A",
                        "primary-dark": "#D4560A",
                        "bg-base-dark": "#0F0F12",
                        "bg-surface-dark": "#1A1A20",
                        "text-primary-dark": "#F5F5F5",
                        "text-secondary-dark": "#9BA3B4",
                        "surface-container-high": "#2A2A32",
                        "surface-bright": "#1E1E26",
                        "surface-container-lowest": "#0F0F12",
                        "on-surface-variant": "#9BA3B4",
                        "outline": "#3F3F46",
                        "on-background": "#F5F5F5",
                        "background": "#0F0F12",
                        "surface-dim": "#09090B",
                        "on-surface": "#F5F5F5",
                        "surface-variant": "#27272A",
                        "surface-container": "#1A1A20",
                        "surface-container-low": "#141418",
                        "surface-container-highest": "#3F3F46"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"],
                        "data": ["JetBrains Mono"]
                    }
                },
            },
        }
    </script>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-bg-base-dark text-text-primary-dark font-body min-h-screen flex flex-col items-center">
<div class="w-full max-w-md min-h-screen flex flex-col bg-bg-base-dark relative overflow-hidden">
<!-- Header / Navigation -->
<header class="flex items-center justify-between px-6 py-6 z-10">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-bg-surface-dark text-text-primary-dark hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div class="flex flex-col items-center">
<span class="text-[10px] font-bold tracking-widest text-text-secondary-dark uppercase opacity-50 mb-1">Step 3 of 5</span>
<div class="flex gap-1.5">
<div class="w-6 h-1 rounded-full bg-primary"></div>
<div class="w-6 h-1 rounded-full bg-primary"></div>
<div class="w-6 h-1 rounded-full bg-primary"></div>
<div class="w-6 h-1 rounded-full bg-surface-container-highest"></div>
<div class="w-6 h-1 rounded-full bg-surface-container-highest"></div>
</div>
</div>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col px-8 pt-12 items-center text-center">
<!-- Animated Kinetic Icon -->
<div class="relative mb-10">
<div class="absolute inset-0 bg-primary opacity-20 blur-2xl rounded-full scale-150"></div>
<div class="relative w-20 h-20 bg-bg-surface-dark rounded-full flex items-center justify-center shadow-sm">
<div class="w-14 h-14 bg-primary/10 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="chat">chat</span>
</div>
</div>
</div>
<!-- Typography Content -->
<div class="space-y-3 mb-12">
<h1 class="text-3xl font-headline font-extrabold tracking-tight text-text-primary-dark">Enter the code</h1>
<p class="text-text-secondary-dark leading-relaxed px-4">
                We've sent a 6-digit verification code to <br/>
<span class="font-data font-medium text-text-primary-dark">+234 803 ••• ••89</span>
</p>
<a class="inline-block text-primary font-semibold text-sm hover:opacity-80 transition-opacity" href="#">Change number</a>
</div>
<!-- OTP Input Field Logic -->
<div class="flex justify-center gap-2 mb-8 px-4">
<!-- Field 1: Filled -->
<div class="w-12 h-16 bg-bg-surface-dark rounded-[12px] flex items-center justify-center border-2 border-transparent">
<div class="otp-dot"></div>
</div>
<!-- Field 2: Filled -->
<div class="w-12 h-16 bg-bg-surface-dark rounded-[12px] flex items-center justify-center border-2 border-transparent">
<div class="otp-dot"></div>
</div>
<!-- Field 3: Filled -->
<div class="w-12 h-16 bg-bg-surface-dark rounded-[12px] flex items-center justify-center border-2 border-transparent">
<div class="otp-dot"></div>
</div>
<!-- Field 4: Active -->
<div class="w-12 h-16 bg-bg-surface-dark rounded-[12px] flex items-center justify-center border-2 border-primary shadow-[0_0_15px_rgba(252,105,10,0.15)]">
<div class="w-[2px] h-6 bg-primary animate-pulse"></div>
</div>
<!-- Field 5: Empty -->
<div class="w-12 h-16 bg-bg-surface-dark rounded-[12px] flex items-center justify-center border-2 border-transparent"></div>
<!-- Field 6: Empty -->
<div class="w-12 h-16 bg-bg-surface-dark rounded-[12px] flex items-center justify-center border-2 border-transparent"></div>
</div>
<!-- Action Area -->
<div class="w-full space-y-6">
<div class="flex flex-col items-center gap-1">
<p class="text-sm text-text-secondary-dark">Resend code in <span class="font-data font-bold text-text-primary-dark">0:28</span></p>
</div>
<div class="pt-4 border-t border-surface-container-high/50 flex flex-col gap-4">
<button class="w-full h-14 bg-bg-surface-dark text-text-primary-dark font-semibold rounded-full hover:bg-surface-container-high transition-all flex items-center justify-center gap-3">
<span class="material-symbols-outlined" data-icon="chat_bubble">chat_bubble</span>
                    Try WhatsApp OTP
                </button>
<p class="text-xs text-text-secondary-dark/60 px-8">
                    By continuing, you agree to our security protocols for multi-factor authentication.
                </p>
</div>
</div>
</main>
<!-- Decorative Kinetic Elements -->
<div class="absolute -bottom-20 -left-20 w-64 h-64 bg-primary/10 rounded-full blur-3xl pointer-events-none"></div>
<div class="absolute top-40 -right-20 w-48 h-48 bg-primary/10 rounded-full blur-3xl pointer-events-none"></div>
<!-- Sticky Footer CTA -->
<footer class="p-8 mt-auto">
<button class="w-full h-14 bg-gradient-to-br from-[#FC690A] to-[#D4560A] text-white font-bold rounded-full shadow-lg shadow-primary/20 flex items-center justify-center gap-2 hover:scale-[1.02] active:scale-[0.98] transition-transform">
            Verify Identity
            <span class="material-symbols-outlined" data-icon="chevron_right">chevron_right</span>
</button>
</footer>
</div>
<!-- Image for Contextual Background (Hidden) -->
<div class="hidden">
<img alt="Security Viz" data-alt="Abstract digital network visualization with flowing orange and blue particles on a dark sophisticated background representing secure encryption" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCH_0rtod-sRPK7sqkSIV8ci2MuYQS5F2sEFz8x81YsxFfxWSQKIGIimN_eKZxAvdJZ-9esuh-nBzRS7vms85yqouvW9iwRmu4RWCGEaoITotlyx5sDgRpKf-0u11Sn_k6xzL39W9vZwmOy68o1IxxheywECWr7HT_JMs_9k16n0rGZSr7Un48N3FqMAaG4rDwH4nWH08OTQa5IInVE6V_ipgIvfWnyE-VDxOPJGDZ_yc61vWlFfw9QWbUiDZ23mrccILFYyz0z4w"/>
</div>
</body></html>
