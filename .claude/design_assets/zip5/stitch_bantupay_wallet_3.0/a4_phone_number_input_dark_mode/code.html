<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-high": "#1A1A20",
                    "surface-bright": "#1A1A20",
                    "tertiary-fixed": "#d0e4ff",
                    "surface-container-lowest": "#1A1A20",
                    "on-surface-variant": "#9BA3B4",
                    "outline": "#9BA3B4",
                    "on-background": "#F5F5F5",
                    "background": "#0F0F12",
                    "on-primary-fixed-variant": "#7b2f00",
                    "on-secondary-fixed-variant": "#77320b",
                    "surface-dim": "#0F0F12",
                    "secondary-fixed-dim": "#ffb695",
                    "primary-fixed": "#ffdbcc",
                    "on-secondary-container": "#753009",
                    "tertiary-container": "#009cfc",
                    "inverse-surface": "#f8f9fd",
                    "on-surface": "#F5F5F5",
                    "on-tertiary": "#ffffff",
                    "tertiary-fixed-dim": "#9ccaff",
                    "on-primary": "#ffffff",
                    "on-primary-container": "#551e00",
                    "outline-variant": "#2e3134",
                    "on-tertiary-fixed-variant": "#00497b",
                    "secondary-container": "#fd9a6c",
                    "on-secondary": "#ffffff",
                    "on-tertiary-fixed": "#001d35",
                    "error": "#ba1a1a",
                    "surface": "#0F0F12",
                    "inverse-on-surface": "#191c1f",
                    "on-error-container": "#93000a",
                    "tertiary": "#0062a1",
                    "primary-fixed-dim": "#ffb695",
                    "on-secondary-fixed": "#351000",
                    "on-tertiary-container": "#003155",
                    "surface-tint": "#FC690A",
                    "inverse-primary": "#ffb695",
                    "error-container": "#ffdad6",
                    "surface-container": "#1A1A20",
                    "primary": "#FC690A",
                    "surface-container-low": "#1A1A20",
                    "secondary-fixed": "#ffdbcc",
                    "secondary": "#964921",
                    "surface-variant": "#2e3134",
                    "on-error": "#ffffff",
                    "surface-container-highest": "#2e3134",
                    "on-primary-fixed": "#351000",
                    "primary-container": "#FC690A"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Inter"],
                    "label": ["Inter"],
                    "mono": ["JetBrains Mono"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #0F0F12;
            font-family: 'Inter', sans-serif;
        }
        .kinetic-gradient {
            background: linear-gradient(135deg, #FC690A 0%, #D4560A 100%);
        }
        .ghost-border {
            outline: 1px solid rgba(155, 163, 180, 0.25);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="flex flex-col min-h-screen text-on-surface max-w-md mx-auto relative overflow-hidden bg-background">
<!-- Progress Bar (Slim 3px orange bar) -->
<div class="fixed top-0 left-0 w-full h-[3px] bg-surface-container-highest z-[60]">
<div class="h-full bg-primary-container w-2/5 transition-all duration-500 ease-out"></div>
</div>
<!-- Navigation Header -->
<nav class="flex items-center justify-between px-6 pt-10 pb-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container transition-colors active:scale-90">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<span class="font-label text-sm font-semibold text-outline tracking-wider">STEP 2 OF 5</span>
<div class="w-10"></div> <!-- Spacer for symmetry -->
</nav>
<!-- Main Content Canvas -->
<main class="flex-1 px-8 pt-6 pb-24">
<!-- Icon Section -->
<div class="flex justify-start mb-10">
<div class="w-[72px] h-[72px] bg-surface-container-low rounded-full flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-[48px] text-primary-container">phone_iphone</span>
</div>
</div>
<!-- Typography: Editorial Voice -->
<div class="mb-12">
<h1 class="font-headline text-[32px] font-extrabold leading-tight tracking-tight text-on-surface mb-3">
                What's your number?
            </h1>
<p class="font-body text-outline text-base leading-relaxed">
                Verification code will be sent to this mobile number for account security.
            </p>
</div>
<!-- Input Field: The Soft Focus -->
<div class="space-y-4">
<div class="flex items-center h-[56px] bg-surface-container rounded-[12px] px-4 group focus-within:ring-2 focus-within:ring-primary-container/40 transition-all">
<!-- Country Picker -->
<div class="flex items-center gap-2 pr-4 border-r border-outline-variant/30">
<span class="text-xl">🇳🇬</span>
<span class="font-mono font-medium text-on-surface">+234</span>
<span class="material-symbols-outlined text-sm text-outline">expand_more</span>
</div>
<!-- Number Input -->
<input class="flex-1 bg-transparent border-none focus:ring-0 font-mono text-lg text-on-surface placeholder:text-outline-variant/60 pl-4" placeholder="800 000 0000" type="tel"/>
</div>
<div class="flex items-center gap-1.5 px-1">
<span class="material-symbols-outlined text-[14px] text-primary">location_on</span>
<p class="font-label text-xs font-medium text-outline">Auto-detected country</p>
</div>
</div>
<!-- Ghost Action -->
<div class="mt-8">
<button class="font-label text-sm font-semibold text-primary-container hover:text-primary transition-colors flex items-center gap-2">
                Use email instead
                <span class="material-symbols-outlined text-[18px]">mail</span>
</button>
</div>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full max-w-md bg-gradient-to-t from-background via-background/95 to-transparent pt-12 pb-10 px-8">
<button class="w-full h-14 kinetic-gradient rounded-full text-on-primary font-headline font-bold text-lg shadow-[0_12px_32px_-4px_rgba(252,105,10,0.3)] active:scale-[0.98] transition-all flex items-center justify-center gap-2">
            Send Code
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">arrow_forward</span>
</button>
</div>
<!-- Background Decorative Elements (The Kinetic Curator) -->
<div class="absolute -top-20 -right-20 w-64 h-64 bg-primary-container/5 rounded-full blur-[80px] -z-10"></div>
<div class="absolute top-1/2 -left-32 w-80 h-80 bg-primary-container/5 rounded-full blur-[100px] -z-10"></div>
</body></html>
