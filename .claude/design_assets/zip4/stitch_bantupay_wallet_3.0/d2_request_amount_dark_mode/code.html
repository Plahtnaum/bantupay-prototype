<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BantuPay 3.0 - Send Assets</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "bg-base-dark": "#0F0F12",
                        "bg-surface-dark": "#1A1A20",
                        "text-primary-dark": "#F5F5F5",
                        "text-secondary-dark": "#9BA3B4",
                        "primary": "#FC690A",
                        "surface-container-lowest": "#1A1A20",
                        "surface-container-low": "#1A1A20",
                        "surface-container-high": "#282830",
                        "background": "#0F0F12",
                        "on-background": "#F5F5F5",
                        "on-surface": "#F5F5F5",
                        "on-surface-variant": "#9BA3B4",
                        "outline-variant": "rgba(155, 163, 180, 0.2)",
                        "primary-container": "#FC690A",
                        "on-primary": "#ffffff",
                        "secondary": "#FC690A"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"],
                        "mono": ["JetBrains Mono"]
                    }
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; background-color: #0F0F12; }
        h1, h2, h3 { font-family: 'Plus Jakarta Sans', sans-serif; }
        .mono-text { font-family: 'JetBrains Mono', monospace; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex justify-center items-start">
<div class="relative flex h-[932px] w-[430px] flex-col bg-bg-base-dark shadow-2xl overflow-hidden">
<!-- Header: Minimal Back-to-Main Exception -->
<div class="flex items-center justify-between p-6">
<button class="flex items-center justify-center size-10 rounded-full bg-bg-surface-dark text-text-primary-dark">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-text-primary-dark text-lg font-bold">Send Assets</h2>
<!-- Redesigned Asset Dropdown Chip -->
<button class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-bg-surface-dark border border-outline-variant text-text-primary-dark hover:bg-surface-container-high transition-colors">
<div class="flex items-center gap-1.5">
<div class="size-5 rounded-full bg-primary flex items-center justify-center text-white text-[10px] font-bold">₦</div>
<span class="text-sm font-semibold tracking-tight">cNGN</span>
</div>
<span class="material-symbols-outlined text-[18px]">keyboard_arrow_down</span>
</button>
</div>
<!-- Amount Display Section -->
<div class="flex-1 flex flex-col items-center justify-center px-6">
<div class="w-full text-center space-y-2">
<p class="text-text-secondary-dark text-sm font-medium uppercase tracking-widest">Enter Amount</p>
<div class="flex items-baseline justify-center gap-2">
<span class="mono-text text-primary text-5xl font-bold">45,000.</span>
<span class="mono-text text-text-secondary-dark/40 text-4xl font-bold">00</span>
</div>
<p class="text-primary font-medium tracking-tight">Nigerian Naira</p>
</div>
<!-- Context Note (Subtle Layering) -->
<div class="mt-8 px-4 py-2 rounded-full bg-bg-surface-dark flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-sm" style="font-variation-settings: 'FILL' 1;">info</span>
<span class="text-xs text-text-secondary-dark">Balance: 124,500.00 cNGN</span>
</div>
</div>
<!-- Numpad Area -->
<div class="bg-bg-surface-dark rounded-t-[2.5rem] p-6 pb-12 shadow-[0_-8px_30px_rgba(0,0,0,0.3)]">
<div class="grid grid-cols-3 gap-3">
<!-- Numbers 1-9 -->
<button class="flex h-16 items-center justify-center rounded-2xl bg-bg-base-dark text-text-primary-dark text-2xl font-bold shadow-sm active:bg-surface-container-high transition-all">1</button>
<button class="flex h-16 items-center justify-center rounded-2xl bg-bg-base-dark text-text-primary-dark text-2xl font-bold shadow-sm active:bg-surface-container-high transition-all">2</button>
<button class="flex h-16 items-center justify-center rounded-2xl bg-bg-base-dark text-text-primary-dark text-2xl font-bold shadow-sm active:bg-surface-container-high transition-all">3</button>
<button class="flex h-16 items-center justify-center rounded-2xl bg-bg-base-dark text-text-primary-dark text-2xl font-bold shadow-sm active:bg-surface-container-high transition-all">4</button>
<button class="flex h-16 items-center justify-center rounded-2xl bg-bg-base-dark text-text-primary-dark text-2xl font-bold shadow-sm active:bg-surface-container-high transition-all">5</button>
<button class="flex h-16 items-center justify-center rounded-2xl bg-bg-base-dark text-text-primary-dark text-2xl font-bold shadow-sm active:bg-surface-container-high transition-all">6</button>
<button class="flex h-16 items-center justify-center rounded-2xl bg-bg-base-dark text-text-primary-dark text-2xl font-bold shadow-sm active:bg-surface-container-high transition-all">7</button>
<button class="flex h-16 items-center justify-center rounded-2xl bg-bg-base-dark text-text-primary-dark text-2xl font-bold shadow-sm active:bg-surface-container-high transition-all">8</button>
<button class="flex h-16 items-center justify-center rounded-2xl bg-bg-base-dark text-text-primary-dark text-2xl font-bold shadow-sm active:bg-surface-container-high transition-all">9</button>
<button class="flex h-16 items-center justify-center rounded-2xl bg-bg-base-dark text-text-primary-dark text-2xl font-bold shadow-sm active:bg-surface-container-high transition-all">.</button>
<button class="flex h-16 items-center justify-center rounded-2xl bg-bg-base-dark text-text-primary-dark text-2xl font-bold shadow-sm active:bg-surface-container-high transition-all">0</button>
<button class="flex h-16 items-center justify-center rounded-2xl bg-bg-base-dark text-text-primary-dark text-2xl font-bold shadow-sm active:bg-surface-container-high transition-all">
<span class="material-symbols-outlined" data-icon="backspace">backspace</span>
</button>
</div>
<!-- Primary CTA: The Kinetic Pill -->
<button class="mt-8 w-full h-14 flex items-center justify-center gap-2 rounded-full bg-primary text-white font-bold text-lg shadow-[0_12px_24px_-8px_rgba(252,105,10,0.5)] active:scale-[0.98] transition-transform">
<span>Continue</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
<!-- Screen Decorative Element: Subtle Gradient Glow -->
<div class="absolute -top-24 -right-24 size-64 bg-primary/10 rounded-full blur-[100px] pointer-events-none"></div>
<div class="absolute -bottom-24 -left-24 size-64 bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
</div>
</body></html>
