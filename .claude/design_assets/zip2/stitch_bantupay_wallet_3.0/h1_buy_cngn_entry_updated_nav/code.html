<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Buy cNGN - BantuPay</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-dim": "#d9dade",
                    "on-secondary-fixed": "#351000",
                    "on-error-container": "#93000a",
                    "surface-container-low": "#f2f3f7",
                    "surface-bright": "#f8f9fd",
                    "background": "#f8f9fd",
                    "surface-variant": "#e1e2e6",
                    "surface": "#f8f9fd",
                    "on-tertiary-fixed": "#001d35",
                    "surface-container-highest": "#e1e2e6",
                    "on-secondary-container": "#753009",
                    "secondary-fixed-dim": "#ffb695",
                    "surface-container-lowest": "#ffffff",
                    "tertiary-fixed-dim": "#9ccaff",
                    "outline-variant": "#e2bfb1",
                    "on-tertiary-fixed-variant": "#00497b",
                    "on-primary-fixed-variant": "#7b2f00",
                    "tertiary-fixed": "#d0e4ff",
                    "error": "#ba1a1a",
                    "on-background": "#191c1f",
                    "inverse-primary": "#ffb695",
                    "surface-tint": "#a23f00",
                    "on-secondary": "#ffffff",
                    "on-primary-container": "#551e00",
                    "error-container": "#ffdad6",
                    "tertiary-container": "#009cfc",
                    "surface-container": "#edeef2",
                    "on-surface-variant": "#5a4137",
                    "on-primary": "#ffffff",
                    "on-tertiary": "#ffffff",
                    "on-primary-fixed": "#351000",
                    "tertiary": "#0062a1",

                    "primary-fixed": "#ffdbcc",
                    "on-surface": "#191c1f",
                    "secondary-container": "#fd9a6c",
                    "primary-fixed-dim": "#ffb695",
                    "primary": "#a23f00",
                    "on-tertiary-container": "#003155",
                    "inverse-on-surface": "#eff1f5",
                    "surface-container-high": "#e7e8ec",
                    "primary-container": "#fc690a",
                    "on-error": "#ffffff",
                    "on-secondary-fixed-variant": "#77320b",
                    "secondary": "#964921",

            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Inter"],
                    "label": ["Inter"],
                    "mono": ["JetBrains Mono"]

        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .numpad-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }
        .glass-panel {
            background: rgba(248, 249, 253, 0.8);
            backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background font-body selection:bg-primary-container selection:text-on-primary">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 w-full bg-[#F5F6FA]/80 dark:bg-[#0F0F12]/80 backdrop-blur-xl">
<div class="flex items-center gap-3">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-[#FC690A]/10 transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<h1 class="text-xl font-bold bg-gradient-to-br from-[#FC690A] to-[#D4560A] bg-clip-text text-transparent font-['Plus_Jakarta_Sans'] tracking-tight">Buy cNGN</h1>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-slate-500">notifications</span>
</div>
</header>
<main class="pt-24 pb-40 px-6 max-w-lg mx-auto">
<!-- Input Section -->
<section class="text-center mb-10">
<div class="inline-flex items-baseline gap-2 mb-2">
<span class="text-on-surface-variant font-headline font-semibold text-lg uppercase tracking-widest">NGN</span>
<div class="font-headline font-bold text-[40px] tracking-tight text-on-surface flex items-center justify-center">
                    50,000<span class="w-1 h-10 bg-primary-container ml-1 animate-pulse"></span>
</div>
</div>
<p class="text-on-surface-variant font-mono text-sm">≈ 49.50 cNGN</p>
</section>
<!-- Kinetic Numpad -->
<section class="mb-12">
<div class="numpad-grid">
<!-- Row 1 -->
<button class="h-16 flex items-center justify-center text-2xl font-headline font-semibold text-on-surface hover:bg-surface-container transition-colors rounded-xl active:scale-90 duration-200">1</button>
<button class="h-16 flex items-center justify-center text-2xl font-headline font-semibold text-on-surface hover:bg-surface-container transition-colors rounded-xl active:scale-90 duration-200">2</button>
<button class="h-16 flex items-center justify-center text-2xl font-headline font-semibold text-on-surface hover:bg-surface-container transition-colors rounded-xl active:scale-90 duration-200">3</button>
<!-- Row 2 -->
<button class="h-16 flex items-center justify-center text-2xl font-headline font-semibold text-on-surface hover:bg-surface-container transition-colors rounded-xl active:scale-90 duration-200">4</button>
<button class="h-16 flex items-center justify-center text-2xl font-headline font-semibold text-on-surface hover:bg-surface-container transition-colors rounded-xl active:scale-90 duration-200">5</button>
<button class="h-16 flex items-center justify-center text-2xl font-headline font-semibold text-on-surface hover:bg-surface-container transition-colors rounded-xl active:scale-90 duration-200">6</button>
<!-- Row 3 -->
<button class="h-16 flex items-center justify-center text-2xl font-headline font-semibold text-on-surface hover:bg-surface-container transition-colors rounded-xl active:scale-90 duration-200">7</button>
<button class="h-16 flex items-center justify-center text-2xl font-headline font-semibold text-on-surface hover:bg-surface-container transition-colors rounded-xl active:scale-90 duration-200">8</button>
<button class="h-16 flex items-center justify-center text-2xl font-headline font-semibold text-on-surface hover:bg-surface-container transition-colors rounded-xl active:scale-90 duration-200">9</button>
<!-- Row 4 -->
<button class="h-16 flex items-center justify-center text-2xl font-headline font-semibold text-on-surface hover:bg-surface-container transition-colors rounded-xl active:scale-90 duration-200">.</button>
<button class="h-16 flex items-center justify-center text-2xl font-headline font-semibold text-on-surface hover:bg-surface-container transition-colors rounded-xl active:scale-90 duration-200">0</button>
<button class="h-16 flex items-center justify-center text-on-surface hover:bg-surface-container transition-colors rounded-xl active:scale-90 duration-200">
<span class="material-symbols-outlined text-3xl">backspace</span>
</button>
</div>
</section>
<!-- Payment Methods - Editorial List -->
<section class="space-y-4">
<h2 class="font-headline font-bold text-lg text-on-surface px-1">Payment Method</h2>
<!-- Bank Transfer -->
<div class="group cursor-pointer bg-surface-container-low rounded-2xl p-4 flex items-center justify-between transition-all hover:bg-surface-container-high active:scale-[0.98]">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-primary-container/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary-container">account_balance</span>
</div>
<div>
<h3 class="font-headline font-semibold text-on-surface">Bank Transfer</h3>
<div class="flex items-center gap-2">
<span class="text-xs font-medium text-tertiary-container bg-tertiary-container/10 px-2 py-0.5 rounded-full">Instant</span>
<span class="text-xs text-on-surface-variant">0% fee</span>
</div>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant group-hover:translate-x-1 transition-transform">chevron_right</span>
</div>
<!-- Card -->
<div class="group cursor-pointer bg-surface-container-low rounded-2xl p-4 flex items-center justify-between transition-all hover:bg-surface-container-high active:scale-[0.98]">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-on-tertiary-fixed-variant/10 flex items-center justify-center">
<span class="material-symbols-outlined text-on-tertiary-fixed-variant">credit_card</span>
</div>
<div>
<h3 class="font-headline font-semibold text-on-surface">Debit/Credit Card</h3>
<div class="flex items-center gap-2">
<span class="text-xs text-on-surface-variant">Visa / Mastercard</span>
<span class="text-xs text-on-surface-variant font-medium">• 1.5% fee</span>
</div>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant group-hover:translate-x-1 transition-transform">chevron_right</span>
</div>
<!-- USSD -->
<div class="group cursor-pointer bg-surface-container-low rounded-2xl p-4 flex items-center justify-between transition-all hover:bg-surface-container-high active:scale-[0.98]">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-secondary-container/20 flex items-center justify-center">
<span class="material-symbols-outlined text-secondary">dialpad</span>
</div>
<div>
<h3 class="font-headline font-semibold text-on-surface">USSD</h3>
<div class="flex items-center gap-2">
<span class="text-xs text-on-surface-variant">0% fee</span>
</div>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant group-hover:translate-x-1 transition-transform">chevron_right</span>
</div>
</section>
<!-- Dynamic CTA -->
<div class="mt-10">
<button class="w-full bg-gradient-to-br from-[#FC690A] to-[#D4560A] text-white py-4 rounded-full font-headline font-bold text-lg shadow-[0_8px_24px_rgba(252,105,10,0.25)] hover:shadow-[0_12px_32px_rgba(252,105,10,0.35)] transition-all active:scale-[0.97]">
                Preview Buy
            </button>
</div>
</main>
<!-- Standardized BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-[32px] bg-[#F5F6FA]/90 dark:bg-[#0F0F12]/90 backdrop-blur-lg shadow-[0_-4px_24px_rgba(252,105,10,0.1)] flex justify-around items-end pb-6 pt-3 px-4 w-full">
<button class="flex flex-col items-center justify-center text-[#FC690A] gap-1 transition-transform duration-200 active:scale-90 group">
<span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-semibold tracking-wide">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 gap-1 transition-transform duration-200 active:scale-90 hover:text-[#FC690A] transition-colors group">
<span class="material-symbols-outlined text-[24px]">account_balance_wallet</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-semibold tracking-wide">Assets</span>
</button>
<!-- Floating QR Scan FAB -->
<div class="relative -top-4">
<button class="w-16 h-16 bg-gradient-to-br from-[#FC690A] to-[#D4560A] rounded-full flex items-center justify-center text-white shadow-lg shadow-[#FC690A]/30 active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined text-3xl">qr_code_scanner</span>
</button>
<span class="absolute -bottom-6 left-1/2 -translate-x-1/2 font-['Plus_Jakarta_Sans'] text-[10px] font-semibold tracking-wide text-slate-400 dark:text-slate-500">Scan</span>
</div>
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 gap-1 transition-transform duration-200 active:scale-90 hover:text-[#FC690A] transition-colors group">
<span class="material-symbols-outlined text-[24px]">history</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-semibold tracking-wide">History</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 gap-1 transition-transform duration-200 active:scale-90 hover:text-[#FC690A] transition-colors group">
<span class="material-symbols-outlined text-[24px]">settings</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-semibold tracking-wide">Settings</span>
</button>
</nav>
<!-- Kinetic Background Accents -->
<div class="fixed top-[-10%] right-[-10%] w-[50%] h-[40%] bg-primary-container/5 rounded-full blur-[100px] pointer-events-none z-0"></div>
<div class="fixed bottom-[5%] left-[-10%] w-[40%] h-[30%] bg-tertiary-container/5 rounded-full blur-[100px] pointer-events-none z-0"></div>
</body></html>
