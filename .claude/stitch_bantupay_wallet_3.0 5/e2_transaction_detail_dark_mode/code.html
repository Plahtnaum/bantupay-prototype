<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Transaction Detail - BantuPay</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary": "#ffffff",
                        "background": "#0F0F12",
                        "surface-container-high": "#2A2A32",
                        "secondary-container": "#fd9a6c",
                        "primary": "#FC690A",
                        "surface-container-lowest": "#1A1A20",
                        "on-primary-fixed-variant": "#7b2f00",
                        "on-background": "#F5F5F5",
                        "on-primary-container": "#ffffff",
                        "tertiary-fixed-dim": "#9ccaff",
                        "tertiary": "#0062a1",
                        "inverse-primary": "#ffb695",
                        "surface-bright": "#1A1A20",
                        "on-error-container": "#93000a",
                        "inverse-on-surface": "#0F0F12",
                        "surface": "#0F0F12",
                        "on-primary-fixed": "#351000",
                        "secondary": "#964921",
                        "primary-fixed": "#ffdbcc",
                        "on-secondary-fixed": "#351000",
                        "on-tertiary-container": "#003155",
                        "on-surface": "#F5F5F5",
                        "surface-dim": "#0F0F12",
                        "on-secondary": "#ffffff",
                        "error": "#ffb4ab",
                        "outline": "#44474e",
                        "inverse-surface": "#F5F5F5",
                        "error-container": "#93000a",
                        "surface-container-low": "#1C1C22",
                        "outline-variant": "#44474e",
                        "tertiary-container": "#009cfc",
                        "on-surface-variant": "#9BA3B4",
                        "on-secondary-container": "#753009",
                        "surface-container": "#1E1E26",
                        "on-error": "#690005",
                        "secondary-fixed-dim": "#ffb695",
                        "on-tertiary": "#ffffff",
                        "surface-container-highest": "#282830",
                        "secondary-fixed": "#ffdbcc",
                        "on-tertiary-fixed-variant": "#00497b",
                        "primary-fixed-dim": "#ffb695",
                        "primary-container": "#FC690A",
                        "on-tertiary-fixed": "#001d35",
                        "on-secondary-fixed-variant": "#77320b",
                        "tertiary-fixed": "#d0e4ff",
                        "surface-tint": "#FC690A",
                        "surface-variant": "#1A1A20",
                        "base-dark": "#0F0F12",
                        "surface-dark": "#1A1A20",
                        "primary-dark": "#F5F5F5",
                        "secondary-dark": "#9BA3B4"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"],
                        "mono": ["JetBrains Mono"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .shadow-brand {
            box-shadow: 0 24px 48px -12px rgba(252, 105, 10, 0.25);
        }
        .ghost-border {
            border: 1px solid rgba(155, 163, 180, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-base-dark font-body text-primary-dark antialiased">
<!-- Top Navigation Bar -->
<header class="fixed top-0 w-full z-50 bg-[#0F0F12]/80 backdrop-blur-xl flex justify-between items-center px-6 py-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-dark hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-primary-dark">close</span>
</button>
<h1 class="font-headline font-bold tracking-tight text-primary-dark">Receipt</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="min-h-screen pt-20 pb-32 px-6 flex flex-col items-center">
<!-- Status Header Section -->
<div class="flex flex-col items-center mt-8 mb-12 text-center">
<div class="w-20 h-20 rounded-full bg-emerald-500/10 flex items-center justify-center mb-6">
<div class="w-16 h-16 rounded-full bg-emerald-500 flex items-center justify-center text-white">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<p class="text-emerald-400 font-headline font-bold uppercase tracking-widest text-sm mb-2">Confirmed</p>
<h2 class="text-[32px] font-headline font-extrabold text-primary-dark tracking-tight">500 cNGN</h2>
</div>
<!-- Transaction Details Card -->
<div class="w-full max-w-md bg-surface-dark rounded-xl p-6 ghost-border shadow-2xl">
<div class="space-y-6">
<!-- Type -->
<div class="flex justify-between items-center">
<span class="text-secondary-dark text-sm font-medium">Type</span>
<span class="text-primary-dark font-semibold">Transfer</span>
</div>
<!-- To -->
<div class="flex justify-between items-start">
<span class="text-secondary-dark text-sm font-medium">To</span>
<div class="flex flex-col items-end">
<span class="text-primary-dark font-semibold">Chidi Benson</span>
<span class="text-xs font-mono text-secondary-dark mt-1">GBC...A72Z</span>
</div>
</div>
<!-- Asset -->
<div class="flex justify-between items-center">
<span class="text-secondary-dark text-sm font-medium">Asset</span>
<div class="flex items-center gap-2">
<div class="w-6 h-6 rounded-full bg-surface-container-high flex items-center justify-center overflow-hidden">
<img alt="Currency Icon" class="w-full h-full object-cover" data-alt="Nigerian Naira cNGN digital asset token icon with vibrant green and white colors" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBkk77h_H16_TiEWEN1CWOqpo0z_iA8rEguX6A_imvW9B75L65RGSoQFnM0d1iSDPLWWNHsRMha9I1qvre9qr7c-wOaJKEVnB6101FDaUF0QCu9AZHbZPNVkXVJ2uDdPpcab2vBO0uBX5ZbK-W87m6JrbJMg-boIgpG_7egrZ3GoCRS7yi00yAq7u_JpgLcwCO89aoDMnl0VbEnGqYoFKwD77xQ8cHnqXp3F15vCpNPPA2G2OQLtPkfJlUyzd0sZAR67EJf8YtcZw"/>
</div>
<span class="text-primary-dark font-semibold">cNGN Stablecoin</span>
</div>
</div>
<!-- Fee -->
<div class="flex justify-between items-center">
<span class="text-secondary-dark text-sm font-medium">Network Fee</span>
<span class="text-primary-dark font-mono text-sm">0.0001 XLM</span>
</div>
<!-- Date -->
<div class="flex justify-between items-center">
<span class="text-secondary-dark text-sm font-medium">Date</span>
<span class="text-primary-dark font-semibold">Oct 24, 2023 • 14:32</span>
</div>
<!-- Divider Alternative: Tonal Shift -->
<div class="pt-6 border-t border-dashed border-white/10">
<div class="flex flex-col gap-2">
<span class="text-secondary-dark text-xs font-medium uppercase tracking-wider">Transaction Hash</span>
<div class="bg-base-dark p-3 rounded-lg flex items-center justify-between">
<span class="text-[10px] font-mono text-secondary-dark truncate pr-4">a7f832...c9d1e2f3g4h5i6j7k8l9m0n1o2p3q4r5s6t7u8v9w0x1y2z</span>
<button class="text-primary hover:opacity-70 transition-opacity">
<span class="material-symbols-outlined text-sm">content_copy</span>
</button>
</div>
</div>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="w-full max-w-md mt-10 space-y-4">
<button class="w-full h-[56px] rounded-full bg-primary text-on-primary font-headline font-bold flex items-center justify-center gap-2 hover:opacity-90 transition-all active:scale-95 shadow-brand">
<span class="material-symbols-outlined">open_in_new</span>
                View on Explorer
            </button>
<button class="w-full h-[56px] rounded-full bg-transparent text-secondary-dark font-headline font-bold flex items-center justify-center gap-2 hover:text-primary-dark transition-all active:scale-95">
<span class="material-symbols-outlined">share</span>
                Share Receipt
            </button>
</div>
</main>
<!-- Visual Polish: Background Gradients -->
<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none opacity-10">
<div class="absolute top-[-10%] right-[-10%] w-[50%] h-[50%] bg-[#FC690A] blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-500 blur-[100px] rounded-full"></div>
</div>
</body></html>
