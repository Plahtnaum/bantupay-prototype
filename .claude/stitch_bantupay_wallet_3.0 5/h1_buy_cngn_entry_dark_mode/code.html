<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Buy cNGN - BantuPay</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                "base-dark": "#0F0F12",
                "surface-dark": "#1A1A20",
                "primary-dark": "#F5F5F5",
                "secondary-dark": "#9BA3B4",
                "brand-orange": "#FC690A",
                "brand-orange-deep": "#D4560A"
            },
            "borderRadius": {
                "DEFAULT": "1rem",
                "lg": "2rem",
                "xl": "3rem",
                "full": "9999px"
            },
            "fontFamily": {
                "headline": ["Plus Jakarta Sans"],
                "body": ["Inter"],
                "label": ["Inter"],
                "mono": ["JetBrains Mono"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .numpad-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-base-dark text-primary-dark font-body selection:bg-brand-orange/30 selection:text-white">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-base-dark/80 backdrop-blur-xl">
<div class="flex items-center gap-3">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-brand-orange/10 transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-primary-dark">arrow_back</span>
</button>
<h1 class="text-xl font-bold bg-gradient-to-br from-brand-orange to-brand-orange-deep bg-clip-text text-transparent font-['Plus_Jakarta_Sans'] tracking-tight">Buy cNGN</h1>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-secondary-dark">notifications</span>
</div>
</header>
<main class="pt-24 pb-40 px-6 max-w-lg mx-auto">
<!-- Input Section -->
<section class="text-center mb-10">
<div class="inline-flex items-baseline gap-2 mb-2">
<span class="text-secondary-dark font-headline font-semibold text-lg uppercase tracking-widest">NGN</span>
<div class="font-headline font-bold text-[40px] tracking-tight text-primary-dark flex items-center justify-center">
                    50,000<span class="w-1 h-10 bg-brand-orange ml-1 animate-pulse"></span>
</div>
</div>
<p class="text-secondary-dark font-mono text-sm">≈ 49.50 cNGN</p>
</section>
<!-- Kinetic Numpad -->
<section class="mb-12">
<div class="numpad-grid">
<!-- Row 1 -->
<button class="h-16 flex items-center justify-center text-2xl font-headline font-semibold text-primary-dark hover:bg-surface-dark transition-colors rounded-xl active:scale-90 duration-200">1</button>
<button class="h-16 flex items-center justify-center text-2xl font-headline font-semibold text-primary-dark hover:bg-surface-dark transition-colors rounded-xl active:scale-90 duration-200">2</button>
<button class="h-16 flex items-center justify-center text-2xl font-headline font-semibold text-primary-dark hover:bg-surface-dark transition-colors rounded-xl active:scale-90 duration-200">3</button>
<!-- Row 2 -->
<button class="h-16 flex items-center justify-center text-2xl font-headline font-semibold text-primary-dark hover:bg-surface-dark transition-colors rounded-xl active:scale-90 duration-200">4</button>
<button class="h-16 flex items-center justify-center text-2xl font-headline font-semibold text-primary-dark hover:bg-surface-dark transition-colors rounded-xl active:scale-90 duration-200">5</button>
<button class="h-16 flex items-center justify-center text-2xl font-headline font-semibold text-primary-dark hover:bg-surface-dark transition-colors rounded-xl active:scale-90 duration-200">6</button>
<!-- Row 3 -->
<button class="h-16 flex items-center justify-center text-2xl font-headline font-semibold text-primary-dark hover:bg-surface-dark transition-colors rounded-xl active:scale-90 duration-200">7</button>
<button class="h-16 flex items-center justify-center text-2xl font-headline font-semibold text-primary-dark hover:bg-surface-dark transition-colors rounded-xl active:scale-90 duration-200">8</button>
<button class="h-16 flex items-center justify-center text-2xl font-headline font-semibold text-primary-dark hover:bg-surface-dark transition-colors rounded-xl active:scale-90 duration-200">9</button>
<!-- Row 4 -->
<button class="h-16 flex items-center justify-center text-2xl font-headline font-semibold text-primary-dark hover:bg-surface-dark transition-colors rounded-xl active:scale-90 duration-200">.</button>
<button class="h-16 flex items-center justify-center text-2xl font-headline font-semibold text-primary-dark hover:bg-surface-dark transition-colors rounded-xl active:scale-90 duration-200">0</button>
<button class="h-16 flex items-center justify-center text-primary-dark hover:bg-surface-dark transition-colors rounded-xl active:scale-90 duration-200">
<span class="material-symbols-outlined text-3xl">backspace</span>
</button>
</div>
</section>
<!-- Payment Methods -->
<section class="space-y-4">
<h2 class="font-headline font-bold text-lg text-primary-dark px-1">Payment Method</h2>
<!-- Bank Transfer -->
<div class="group cursor-pointer bg-surface-dark rounded-2xl p-4 flex items-center justify-between transition-all hover:brightness-125 active:scale-[0.98]">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-brand-orange/10 flex items-center justify-center">
<span class="material-symbols-outlined text-brand-orange">account_balance</span>
</div>
<div>
<h3 class="font-headline font-semibold text-primary-dark">Bank Transfer</h3>
<div class="flex items-center gap-2">
<span class="text-xs font-medium text-brand-orange bg-brand-orange/10 px-2 py-0.5 rounded-full">Instant</span>
<span class="text-xs text-secondary-dark">0% fee</span>
</div>
</div>
</div>
<span class="material-symbols-outlined text-secondary-dark group-hover:translate-x-1 transition-transform">chevron_right</span>
</div>
<!-- Card -->
<div class="group cursor-pointer bg-surface-dark rounded-2xl p-4 flex items-center justify-between transition-all hover:brightness-125 active:scale-[0.98]">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-blue-500/10 flex items-center justify-center">
<span class="material-symbols-outlined text-blue-400">credit_card</span>
</div>
<div>
<h3 class="font-headline font-semibold text-primary-dark">Debit/Credit Card</h3>
<div class="flex items-center gap-2">
<span class="text-xs text-secondary-dark">Visa / Mastercard</span>
<span class="text-xs text-secondary-dark font-medium">• 1.5% fee</span>
</div>
</div>
</div>
<span class="material-symbols-outlined text-secondary-dark group-hover:translate-x-1 transition-transform">chevron_right</span>
</div>
<!-- USSD -->
<div class="group cursor-pointer bg-surface-dark rounded-2xl p-4 flex items-center justify-between transition-all hover:brightness-125 active:scale-[0.98]">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-amber-500/10 flex items-center justify-center">
<span class="material-symbols-outlined text-amber-400">dialpad</span>
</div>
<div>
<h3 class="font-headline font-semibold text-primary-dark">USSD</h3>
<div class="flex items-center gap-2">
<span class="text-xs text-secondary-dark">0% fee</span>
</div>
</div>
</div>
<span class="material-symbols-outlined text-secondary-dark group-hover:translate-x-1 transition-transform">chevron_right</span>
</div>
</section>
<!-- Dynamic CTA -->
<div class="mt-10">
<button class="w-full bg-gradient-to-br from-brand-orange to-brand-orange-deep text-white py-4 rounded-full font-headline font-bold text-lg shadow-[0_8px_24px_rgba(252,105,10,0.3)] hover:shadow-[0_12px_32px_rgba(252,105,10,0.45)] transition-all active:scale-[0.97]">
                Preview Buy
            </button>
</div>
</main>
<!-- Standardized BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-[32px] bg-base-dark/90 backdrop-blur-lg shadow-[0_-4px_24px_rgba(0,0,0,0.4)] flex justify-around items-end pb-6 pt-3 px-4">
<button class="flex flex-col items-center justify-center text-brand-orange gap-1 transition-transform duration-200 active:scale-90 group">
<span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-semibold tracking-wide">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-secondary-dark gap-1 transition-transform duration-200 active:scale-90 hover:text-brand-orange transition-colors group">
<span class="material-symbols-outlined text-[24px]">account_balance_wallet</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-semibold tracking-wide">Assets</span>
</button>
<!-- Floating QR Scan FAB -->
<div class="relative -top-4">
<button class="w-16 h-16 bg-gradient-to-br from-brand-orange to-brand-orange-deep rounded-full flex items-center justify-center text-white shadow-lg shadow-brand-orange/30 active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined text-3xl">qr_code_scanner</span>
</button>
<span class="absolute -bottom-6 left-1/2 -translate-x-1/2 font-['Plus_Jakarta_Sans'] text-[10px] font-semibold tracking-wide text-secondary-dark">Scan</span>
</div>
<button class="flex flex-col items-center justify-center text-secondary-dark gap-1 transition-transform duration-200 active:scale-90 hover:text-brand-orange transition-colors group">
<span class="material-symbols-outlined text-[24px]">history</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-semibold tracking-wide">History</span>
</button>
<button class="flex flex-col items-center justify-center text-secondary-dark gap-1 transition-transform duration-200 active:scale-90 hover:text-brand-orange transition-colors group">
<span class="material-symbols-outlined text-[24px]">settings</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-semibold tracking-wide">Settings</span>
</button>
</nav>
<!-- Kinetic Background Accents -->
<div class="fixed top-[-10%] right-[-10%] w-[50%] h-[40%] bg-brand-orange/5 rounded-full blur-[100px] pointer-events-none z-0"></div>
<div class="fixed bottom-[5%] left-[-10%] w-[40%] h-[30%] bg-brand-orange/5 rounded-full blur-[100px] pointer-events-none z-0"></div>
</body></html>
